  <script>
'use strict';
// Informe profesional: documento imprimible (tema claro A4) generado desde el
// análisis del motor. Solo presentación: ningún número se calcula aquí.
const Informe = {};

Informe.eur = n => Math.round(Number(n) || 0).toLocaleString('es-ES') + ' €';
Informe.pct1 = n => (Number(n) || 0).toFixed(1).replace('.', ',') + ' %';
Informe.COLOR = { verde:'#2e7d32', ambar:'#b26a00', rojo:'#c62828', neutro:'#8a8f98', tinta:'#1c1e21', suave:'#5f6570' };

Informe.nombreSector = function (sector) {
  const s = (Templates.SECTORES || []).find(x => x.id === sector);
  if (s) return s.nombre;
  if (typeof sector === 'string' && sector.indexOf('personalizada:') === 0) {
    const t = ((window.App && App.state.plantillas) || []).find(t2 => ('personalizada:' + t2.id) === sector);
    if (t && t.nombre) return t.nombre;
  }
  return 'Otro / personalizado';
};

Informe.contexto = function (project) {
  const benchmarks = Templates.benchmarks(project.sector);
  const catZona = Templates.ZONA();
  const catRiesgos = Templates.RIESGOS(Templates.sectorEfectivoRiesgos(project.sector, (window.App && App.state.plantillas) || []));
  const a = Engine.analyze(project);
  const zona = Engine.veredictoZona(project.zona, catZona);
  const validacion = Engine.validacionRiesgos(project, catRiesgos);
  return {
    project, a, benchmarks, catRiesgos, validacion,
    vf: Engine.veredictoFinal(project, { catalogoZona: catZona, catalogoRiesgos: catRiesgos,
      topePersonal: (benchmarks.personalSobreVentasPct || [0, 35])[1] }),
    riesgo: Engine.indiceRiesgo(project, a, { zona, validacion }),
    plan: Engine.planViabilidad(project, { benchmarks }),
    objetivos: Engine.objetivos(project, a, benchmarks),
    temporadas: Engine.resultadoPorTemporada(project, 1),
    sectorNombre: Informe.nombreSector(project.sector),
    fecha: new Date().toLocaleDateString('es-ES', { day:'numeric', month:'long', year:'numeric' })
  };
};

Informe.abrir = function (project) {
  Informe.cerrar();
  const ctx = Informe.contexto(project);
  const doc = UI.el('div', { class:'inf-doc' }, Informe.SECCIONES.map(fn => fn(ctx)).filter(Boolean));
  const barra = UI.el('div', { class:'inf-barra no-print' }, [
    UI.el('button', { class:'btn', onclick: Informe.cerrar }, '← Volver'),
    UI.el('button', { class:'btn btn--accent', onclick: () => window.print() }, '⬇ Descargar PDF')
  ]);
  const overlay = UI.el('div', { id:'informe-overlay', class:'inf-overlay' }, [barra, doc]);
  document.body.appendChild(overlay);
  document.body.classList.add('informe-abierto');
  overlay.scrollTop = 0;
};

Informe.cerrar = function () {
  const o = document.getElementById('informe-overlay');
  if (o) o.remove();
  document.body.classList.remove('informe-abierto');
};

// ---------- helpers de presentación ----------
Informe.indicador = function (etq, val, mal) {
  return UI.el('div', { class:'inf-ind' + (mal ? ' inf-ind--mal' : '') }, [
    UI.el('div', { class:'inf-ind__val' }, val),
    UI.el('div', { class:'inf-ind__etq' }, etq)
  ]);
};

Informe.tabla = function (cabeceras, filas) {
  return UI.el('table', { class:'inf-tabla' }, [
    UI.el('thead', null, UI.el('tr', null, cabeceras.map(h => UI.el('th', null, h)))),
    UI.el('tbody', null, filas.map(f => UI.el('tr', null, f.map(cel =>
      UI.el('td', null, (cel && cel.nodeType) ? cel : String(cel))))))
  ]);
};

Informe.semaforo = function (color, txt) {
  return UI.el('span', { class:'inf-sem' }, [
    UI.el('span', { class:'inf-punto', style:'background:' + (Informe.COLOR[color] || Informe.COLOR.neutro) }), txt]);
};

// ---------- secciones ----------
Informe.sPortada = function (ctx) {
  const c = Informe.COLOR[ctx.vf.color] || Informe.COLOR.neutro;
  return UI.el('section', { class:'inf-seccion inf-portada' }, [
    UI.el('div', { class:'inf-portada__marca' }, 'SimuladorX'),
    UI.el('h1', null, ctx.project.nombre || 'Proyecto'),
    UI.el('div', { class:'inf-portada__sub' }, 'Estudio de viabilidad · ' + ctx.sectorNombre),
    UI.el('div', { class:'inf-portada__fecha' }, ctx.fecha),
    UI.el('div', { class:'inf-portada__veredicto', style:'border-color:' + c + ';color:' + c }, [
      UI.el('span', { class:'inf-punto', style:'background:' + c }), ctx.vf.titulo]),
    UI.el('div', { class:'inf-portada__pie' }, 'Informe generado automáticamente con SimuladorX a partir de los datos introducidos.')
  ]);
};

Informe.sResumen = function (ctx) {
  const a = ctx.a, real = a.realista;
  const beMes = isFinite(a.breakeven.breakevenAnual) ? a.breakeven.breakevenAnual / 12 : null;
  const ms = a.breakeven.margenSeguridadPct;
  const euroHora = a.propietario.euroHoraReal;
  const frases = [];
  frases.push('El proyecto "' + (ctx.project.nombre || 'sin nombre') + '" (' + ctx.sectorNombre.toLowerCase() + ') prevé facturar ' + Informe.eur(a.base) + ' al año.');
  frases.push('En el escenario realista deja ' + Informe.eur(real.beneficioNeto / 12) + ' netos al mes (' + Informe.eur(real.beneficioNeto) + '/año), con un margen neto del ' + Informe.pct1(real.margenNetoPct) + '.');
  if (beMes != null) frases.push('Necesita ' + Informe.eur(beMes) + '/mes para cubrir costes' + (isFinite(ms) && ms >= 0 ? ', lo que deja un margen de seguridad del ' + Informe.pct1(ms) : ', por encima de lo que prevé facturar') + '.');
  frases.push('Veredicto global: ' + ctx.vf.titulo.toLowerCase() + ', con un índice de riesgo de ' + ctx.riesgo.valor + '/100 (' + ({ baja:'bajo', media:'medio', alta:'alto' })[ctx.riesgo.banda] + ').');
  if (!ctx.plan.viableYa) frases.push(ctx.plan.alcanzaViabilidad
    ? 'Hay un camino realista hacia la viabilidad (ver Plan de acción).'
    : 'Con mejoras plausibles no llega a viable: hay que replantear el modelo (ver Plan de acción).');
  return UI.el('section', { class:'inf-seccion' }, [
    UI.el('h2', null, '1 · Resumen ejecutivo'),
    UI.el('p', null, frases.join(' ')),
    UI.el('div', { class:'inf-inds' }, [
      Informe.indicador('Beneficio neto/mes', Informe.eur(real.beneficioNeto / 12), real.beneficioNeto < 0),
      Informe.indicador('Beneficio neto/año', Informe.eur(real.beneficioNeto), real.beneficioNeto < 0),
      Informe.indicador('Punto de equilibrio', beMes != null ? Informe.eur(beMes) + '/mes' : '—', beMes == null),
      Informe.indicador('Margen de seguridad', isFinite(ms) ? Informe.pct1(ms) : '—', !isFinite(ms) || ms < 0),
      Informe.indicador('Payback', (a.inversion && isFinite(a.inversion.paybackAnios)) ? a.inversion.paybackAnios.toFixed(1).replace('.', ',') + ' años' : '—', !!(a.inversion && a.inversion.paybackAnios > 5)),
      Informe.indicador('€/hora del propietario', euroHora != null ? euroHora.toFixed(2).replace('.', ',') + ' €' : '—', euroHora != null && euroHora < 8)
    ])
  ]);
};

// ---------- gráficos SVG (paleta clara, sin librerías) ----------
Informe.svgAro = function (valor, color) {
  const ns = 'http://www.w3.org/2000/svg';
  const r = 44, c = 2 * Math.PI * r, off = c * (1 - Math.max(0, Math.min(100, valor)) / 100);
  const svg = document.createElementNS(ns, 'svg');
  svg.setAttribute('viewBox', '0 0 110 110'); svg.setAttribute('width', '110'); svg.setAttribute('height', '110');
  const mk = (extra) => { const el = document.createElementNS(ns, 'circle');
    el.setAttribute('cx', 55); el.setAttribute('cy', 55); el.setAttribute('r', r);
    el.setAttribute('fill', 'none'); el.setAttribute('stroke-width', '10');
    for (const k of Object.keys(extra)) el.setAttribute(k, extra[k]); return el; };
  svg.appendChild(mk({ stroke:'#e4e6ea' }));
  svg.appendChild(mk({ stroke: color, 'stroke-dasharray': c, 'stroke-dashoffset': off,
    'stroke-linecap':'round', transform:'rotate(-90 55 55)' }));
  const t = document.createElementNS(ns, 'text');
  t.setAttribute('x', 55); t.setAttribute('y', 63); t.setAttribute('text-anchor', 'middle');
  t.setAttribute('font-size', '26'); t.setAttribute('font-weight', '700'); t.setAttribute('fill', color);
  t.textContent = valor;
  svg.appendChild(t);
  return svg;
};

Informe.svgBarrasEscenarios = function (items) {
  const W = 520, H = 190, pad = 34, bw = 90;
  const ns = 'http://www.w3.org/2000/svg';
  const max = Math.max(1, ...items.map(i => Math.abs(i.val)));
  const y0 = (H - 20) / 2 + 6;
  const esc = ((H - 20) / 2 - pad) / max;
  const svg = document.createElementNS(ns, 'svg');
  svg.setAttribute('viewBox', '0 0 ' + W + ' ' + H); svg.setAttribute('width', '100%');
  const eje = document.createElementNS(ns, 'line');
  eje.setAttribute('x1', 10); eje.setAttribute('x2', W - 10); eje.setAttribute('y1', y0); eje.setAttribute('y2', y0);
  eje.setAttribute('stroke', '#c9ccd2'); svg.appendChild(eje);
  items.forEach((it, i) => {
    const x = 45 + i * ((W - 90) / items.length);
    const h = Math.abs(it.val) * esc;
    const rect = document.createElementNS(ns, 'rect');
    rect.setAttribute('x', x); rect.setAttribute('width', bw);
    rect.setAttribute('y', it.val >= 0 ? y0 - h : y0); rect.setAttribute('height', Math.max(1, h));
    rect.setAttribute('fill', it.val >= 0 ? '#2e7d32' : '#c62828'); rect.setAttribute('rx', 3);
    svg.appendChild(rect);
    const t = document.createElementNS(ns, 'text');
    t.setAttribute('x', x + bw / 2); t.setAttribute('y', it.val >= 0 ? y0 - h - 8 : y0 + h + 15);
    t.setAttribute('text-anchor', 'middle'); t.setAttribute('font-size', '13'); t.setAttribute('fill', '#1c1e21');
    t.textContent = Informe.eur(it.val) + '/mes';
    svg.appendChild(t);
    const e2 = document.createElementNS(ns, 'text');
    e2.setAttribute('x', x + bw / 2); e2.setAttribute('y', H - 4);
    e2.setAttribute('text-anchor', 'middle'); e2.setAttribute('font-size', '12'); e2.setAttribute('fill', '#5f6570');
    e2.textContent = it.etq;
    svg.appendChild(e2);
  });
  return svg;
};

Informe.svgApilada = function (s) {
  const personal = Math.max(0, Number(s.costePersonalAnual) || 0);
  const fijosSinPersonal = Math.max(0, (s.costesFijosAnuales || 0) - personal);
  const partes = [
    { etq:'Mercancía', val:s.costeMercancia, color:'#9aa0ab' },
    { etq:'Merma', val:s.merma, color:'#b4b9c2' },
    { etq:'Personal', val:personal, color:'#7d8490' },
    { etq:'Fijos', val:fijosSinPersonal, color:'#666d79' },
    { etq:'Impuestos', val:s.impuestos, color:'#cdd1d8' },
    { etq:'Beneficio', val:Math.max(0, s.beneficioNeto), color:'#2e7d32' }
  ];
  const total = partes.reduce((t, p) => t + p.val, 0) || 1;
  const W = 520, H = 52; let x = 0;
  const ns = 'http://www.w3.org/2000/svg';
  const svg = document.createElementNS(ns, 'svg');
  svg.setAttribute('viewBox', '0 0 ' + W + ' ' + H); svg.setAttribute('width', '100%');
  partes.forEach(p => {
    const w = p.val / total * W;
    const rect = document.createElementNS(ns, 'rect');
    rect.setAttribute('x', x); rect.setAttribute('y', 0); rect.setAttribute('width', Math.max(0, w)); rect.setAttribute('height', 26);
    rect.setAttribute('fill', p.color);
    svg.appendChild(rect);
    if (w > 46) {
      const t = document.createElementNS(ns, 'text');
      t.setAttribute('x', x); t.setAttribute('y', 44); t.setAttribute('font-size', '11'); t.setAttribute('fill', '#5f6570');
      t.textContent = p.etq + ' ' + Math.round(p.val / total * 100) + ' %';
      svg.appendChild(t);
    }
    x += w;
  });
  return svg;
};

Informe.sVeredicto = function (ctx) {
  const col = { verde: Informe.COLOR.verde, ambar: Informe.COLOR.ambar, rojo: Informe.COLOR.rojo, neutro: Informe.COLOR.neutro };
  const bandaTxt = { baja:'Riesgo bajo', media:'Riesgo medio', alta:'Riesgo alto' };
  const bandaCol = { baja: Informe.COLOR.verde, media: Informe.COLOR.ambar, alta: Informe.COLOR.rojo };
  const dims = UI.el('div', { class:'inf-dims' }, ctx.vf.dimensiones.map(d =>
    UI.el('div', { class:'inf-dim' }, [
      UI.el('span', { class:'inf-punto', style:'background:' + (col[d.estado] || col.neutro) }),
      UI.el('strong', null, d.etiqueta + ': '),
      UI.el('span', null, d.texto)
    ])));
  const compBars = UI.el('div', { class:'inf-riesgo__comp' }, ctx.riesgo.componentes.map(cp => {
    const pctBar = cp.max > 0 ? cp.puntos / cp.max * 100 : 0;
    return UI.el('div', { class:'inf-comp' }, [
      UI.el('div', { class:'inf-comp__etq' }, cp.etiqueta + ' (' + String(cp.puntos).replace('.', ',') + '/' + cp.max + ')'),
      UI.el('div', { class:'inf-comp__track' }, [UI.el('div', { class:'inf-comp__fill', style:'width:' + pctBar + '%' })]),
      UI.el('div', { class:'inf-comp__txt' }, cp.texto)
    ]);
  }));
  return UI.el('section', { class:'inf-seccion' }, [
    UI.el('h2', null, '2 · Veredicto y riesgo'),
    UI.el('div', { class:'inf-veredicto' }, [
      UI.el('div', null, [
        UI.el('div', { class:'inf-veredicto__titulo', style:'color:' + (col[ctx.vf.color] || col.neutro) }, ctx.vf.titulo),
        UI.el('p', { class:'inf-suave' }, (ctx.vf.rebajas && ctx.vf.rebajas.length) ? ctx.vf.rebajas[0] : ctx.a.verdict.motivo),
        dims
      ]),
      UI.el('div', { class:'inf-riesgo__aro' }, [
        Informe.svgAro(ctx.riesgo.valor, bandaCol[ctx.riesgo.banda]),
        UI.el('div', { class:'inf-riesgo__banda', style:'color:' + bandaCol[ctx.riesgo.banda] }, bandaTxt[ctx.riesgo.banda]),
        UI.el('div', { class:'inf-suave' }, 'Índice de riesgo (0–100)')
      ])
    ]),
    compBars
  ]);
};

Informe.sEscenarios = function (ctx) {
  const a = ctx.a;
  const esc = ctx.project.escenarios || { optimistaPct:15, pesimistaPct:20 };
  const cols = ['', 'Optimista (+' + String(esc.optimistaPct).replace('.', ',') + ' %)', 'Realista', 'Pesimista (−' + String(esc.pesimistaPct).replace('.', ',') + ' %)'];
  const f = (k) => [a.optimista[k], a.realista[k], a.pesimista[k]];
  const filas = [
    ['Facturación'].concat(f('facturacion').map(Informe.eur)),
    ['Margen bruto'].concat(f('margenBruto').map(Informe.eur)),
    ['Costes fijos'].concat(f('costesFijosAnuales').map(Informe.eur)),
    ['Impuestos'].concat(f('impuestos').map(Informe.eur)),
    ['Beneficio neto/año'].concat(f('beneficioNeto').map(Informe.eur)),
    ['Beneficio neto/mes'].concat(f('beneficioNeto').map(v => Informe.eur(v / 12)))
  ];
  const kids = [
    UI.el('h2', null, '3 · Escenarios'),
    UI.el('p', { class:'inf-suave' }, 'Tu previsión (realista) con un margen arriba y abajo para ver el mejor y el peor caso. Los gastos variables y semi-fijos escalan con las ventas.'),
    Informe.tabla(cols, filas),
    Informe.svgBarrasEscenarios([
      { etq:'Optimista', val: a.optimista.beneficioNeto / 12 },
      { etq:'Realista', val: a.realista.beneficioNeto / 12 },
      { etq:'Pesimista', val: a.pesimista.beneficioNeto / 12 }
    ])
  ];
  const tipos = new Set(ctx.project.calendario || []);
  if (tipos.size > 1) {
    const t = ctx.temporadas, fac = ctx.project.facturacion || {};
    kids.push(UI.el('h3', null, 'Por temporada (realista)'));
    kids.push(Informe.tabla(['Temporada', 'Meses/año', 'Beneficio €/mes'], [
      ['Fuerte', String(fac.nBuenos || 0), Informe.eur(t.fuertes.benefMes)],
      ['Media', String(fac.nNormales || 0), Informe.eur(t.medios.benefMes)],
      ['Floja', String(fac.nMalos || 0), Informe.eur(t.flojos.benefMes)]
    ]));
  }
  return UI.el('section', { class:'inf-seccion' }, kids);
};

Informe.sCostes = function (ctx) {
  const real = ctx.a.realista;
  const p = ctx.project;
  const ventasMes = ctx.a.base / 12;
  const gastos = [];
  if (real.costeMercancia > 0) gastos.push({ concepto:'Mercancía / materiales', mes: real.costeMercancia / 12 });
  if (real.merma > 0) gastos.push({ concepto:'Merma, regalos e impagos', mes: real.merma / 12 });
  const personalMes = Engine.costePersonalMensual(p);
  if (personalMes > 0) gastos.push({ concepto:'Personal (con SS y 14 pagas)', mes: personalMes });
  const sueldo = p.propietario ? (Number(p.propietario.sueldoMes) || 0) : 0;
  if (sueldo > 0) gastos.push({ concepto:'Tu sueldo', mes: sueldo });
  (p.costesFijos || []).forEach(c => { const imp = Number(c.importe) || 0; if (imp > 0) gastos.push({ concepto: c.concepto || 'Gasto fijo', mes: imp }); });
  if (real.impuestos > 0) gastos.push({ concepto:'Impuestos', mes: real.impuestos / 12 });
  gastos.sort((x, y) => y.mes - x.mes);
  return UI.el('section', { class:'inf-seccion' }, [
    UI.el('h2', null, '4 · Dónde va el dinero'),
    UI.el('p', { class:'inf-suave' }, 'Reparto de cada euro de ventas en el escenario realista.'),
    Informe.svgApilada(real),
    real.beneficioNeto < 0 ? UI.el('p', { class:'inf-alerta' }, 'Ojo: los gastos superan las ventas — la barra reparte el gasto total y la pérdida es de ' + Informe.eur(-real.beneficioNeto) + '/año.') : null,
    UI.el('h3', null, 'Los gastos con mayor impacto'),
    Informe.tabla(['Gasto', '€/mes', '% de las ventas'],
      gastos.slice(0, 5).map(g => [g.concepto, Informe.eur(g.mes), ventasMes > 0 ? Informe.pct1(g.mes / ventasMes * 100) : '—']))
  ]);
};

Informe.sSector = function (ctx) {
  const b = ctx.benchmarks || {};
  const a = ctx.a, p = ctx.project;
  const filas = [];
  const fmtPct = v => (Number(v) || 0).toFixed(0) + ' %';
  const fmtAnios = v => (Number(v) || 0).toFixed(1).replace('.', ',') + ' años';
  const fila = (etq, val, rango, fmt) => {
    if (val == null || rango == null) {
      filas.push([etq, val == null ? '—' : fmt(val), rango ? fmt(rango[0]) + ' – ' + fmt(rango[1]) : '—', Informe.semaforo('neutro', 'sin datos')]);
      return;
    }
    const encima = val > rango[1];
    filas.push([etq, fmt(val), fmt(rango[0]) + ' – ' + fmt(rango[1]),
      Informe.semaforo(encima ? 'rojo' : 'verde', encima ? 'por encima' : 'dentro')]);
  };
  fila('Coste de mercancía / ventas', a.realista.costeMercanciaPct, b.costeMercanciaPct, fmtPct);
  fila('Merma / ventas', Number(p.mermaPct) || 0, b.mermaPct, fmtPct);
  const alquiler = (p.costesFijos || []).find(c => /alquiler/i.test(c.concepto || ''));
  fila('Alquiler / ventas', (alquiler && a.base > 0) ? (Number(alquiler.importe) || 0) * 12 / a.base * 100 : null, b.alquilerSobreVentasPct, fmtPct);
  const personalAnual = Engine.costePersonalAnual(p);
  fila('Personal / ventas', (personalAnual > 0 && a.base > 0) ? personalAnual / a.base * 100 : null, b.personalSobreVentasPct, fmtPct);
  fila('Payback de la inversión', (a.inversion && isFinite(a.inversion.paybackAnios)) ? a.inversion.paybackAnios : null, b.paybackAnios, fmtAnios);
  const esGenerico = p.sector === 'generico' || (typeof p.sector === 'string' && p.sector.indexOf('personalizada:') === 0);
  const nota = esGenerico
    ? 'Sin sector concreto los rangos son genéricos: tómalos solo como referencia amplia.'
    : 'Rangos orientativos habituales del sector; cada negocio es un mundo.';
  return UI.el('section', { class:'inf-seccion' }, [
    UI.el('h2', null, '5 · Comparativa con el sector'),
    Informe.tabla(['Ratio', 'Tu proyecto', 'Rango orientativo', ''], filas),
    UI.el('p', { class:'inf-suave' }, nota)
  ]);
};

Informe.sPuntos = function (ctx) {
  const a = ctx.a, vf = ctx.vf;
  const fuertes = [];
  vf.dimensiones.filter(d => d.estado === 'verde').forEach(d => fuertes.push(d.etiqueta + ': ' + d.texto));
  const ms = a.breakeven.margenSeguridadPct;
  if (isFinite(ms) && ms >= 25) fuertes.push('Margen de seguridad holgado (' + Informe.pct1(ms) + '): aguantas meses flojos.');
  if (a.realista.beneficioNeto > 0 && a.pesimista.beneficioNeto >= 0) fuertes.push('Incluso en un mal año no entras en pérdidas.');
  if (a.inversion && isFinite(a.inversion.paybackAnios) && ctx.benchmarks.paybackAnios && a.inversion.paybackAnios <= ctx.benchmarks.paybackAnios[1])
    fuertes.push('Recuperas la inversión en ' + a.inversion.paybackAnios.toFixed(1).replace('.', ',') + ' años, dentro de lo normal del sector.');

  const debiles = [];
  vf.rebajas.forEach(r => debiles.push(r));
  vf.avisos.forEach(t => debiles.push(t));
  ctx.objetivos.filter(o2 => o2.prioridad === 'alta').forEach(o2 => { if (!debiles.includes(o2.texto)) debiles.push(o2.texto); });

  const marcados = ctx.project.riesgosMarcados || [];
  const pendientes = [];
  (ctx.catRiesgos || []).forEach(cat => (cat.items || []).forEach(it => { if (!marcados.includes(it.id)) pendientes.push(it.texto); }));

  const lista = (items, vacio) => items.length
    ? UI.el('ul', { class:'inf-lista' }, items.map(t => UI.el('li', null, t)))
    : UI.el('p', { class:'inf-suave' }, vacio);

  return UI.el('section', { class:'inf-seccion' }, [
    UI.el('h2', null, '6 · Puntos fuertes, débiles y riesgos'),
    UI.el('h3', null, '✔ Puntos fuertes'),
    lista(fuertes, 'No hay señales claramente positivas todavía.'),
    UI.el('h3', null, '✖ Puntos débiles'),
    lista(debiles, 'Sin debilidades destacables con los datos actuales.'),
    UI.el('h3', null, '⚠ Riesgos pendientes de validar (' + ctx.validacion.hechos + '/' + ctx.validacion.total + ' comprobados)'),
    pendientes.length
      ? UI.el('ul', { class:'inf-lista' }, pendientes.slice(0, 8).map(t => UI.el('li', null, t)).concat(
          pendientes.length > 8 ? [UI.el('li', { class:'inf-suave' }, '… y ' + (pendientes.length - 8) + ' más en la pestaña Riesgos.')] : []))
      : UI.el('p', { class:'inf-suave' }, 'Checklist completo: todo validado.')
  ]);
};

Informe.sPlan = function (ctx) {
  const plan = ctx.plan;
  const kids = [UI.el('h2', null, '7 · Plan de acción')];
  if (ctx.objetivos.length) {
    kids.push(UI.el('h3', null, 'Acciones priorizadas'));
    kids.push(UI.el('ol', { class:'inf-lista' }, ctx.objetivos.map(o2 =>
      UI.el('li', null, o2.texto + (o2.impactoAnual != null ? ' (+' + Informe.eur(o2.impactoAnual) + '/año)' : '')))));
  }
  kids.push(UI.el('h3', null, plan.viableYa ? 'Cómo mejorar aún más' : 'Camino a la viabilidad'));
  kids.push(UI.el('p', { class: (plan.alcanzaViabilidad || plan.viableYa) ? '' : 'inf-alerta' }, plan.resumen));
  if (plan.pasos.length) {
    kids.push(Informe.tabla(['#', 'Acción', 'Impacto'], plan.pasos.map((paso, i) =>
      [String(i + 1), paso.descripcion, (paso.impactoMes >= 0 ? '+' : '') + Informe.eur(paso.impactoMes) + '/mes'])));
    kids.push(UI.el('div', { class:'inf-antes-despues' }, [
      UI.el('div', { class:'inf-ad__caja' }, [
        UI.el('div', { class:'inf-ind__etq' }, 'Hoy'),
        UI.el('div', { class:'inf-ind__val' + (plan.antes.netoMes < 0 ? ' inf-neg' : '') }, Informe.eur(plan.antes.netoMes) + '/mes')]),
      UI.el('div', { class:'inf-ad__flecha' }, '→'),
      UI.el('div', { class:'inf-ad__caja' }, [
        UI.el('div', { class:'inf-ind__etq' }, 'Con el plan'),
        UI.el('div', { class:'inf-ind__val' + (plan.despues.netoMes < 0 ? ' inf-neg' : '') }, Informe.eur(plan.despues.netoMes) + '/mes')])
    ]));
  }
  return UI.el('section', { class:'inf-seccion inf-plan' }, kids);
};

Informe.sConclusiones = function (ctx) {
  const frases = [];
  const nivel = ctx.vf.nivel;
  if (nivel === 'adelante') frases.push('Los números sostienen el proyecto: es rentable en el escenario realista y aguanta un año malo.');
  else if (nivel === 'negocia') frases.push('El proyecto puede funcionar, pero va justo: negocia condiciones (alquiler, proveedores) y revisa los puntos débiles antes de comprometerte.');
  else frases.push('Con los datos actuales el proyecto no se sostiene: no lo firmes tal cual.');
  if (!ctx.plan.viableYa) frases.push(ctx.plan.alcanzaViabilidad
    ? 'El plan de acción marca un camino realista hacia la viabilidad; valida esas palancas antes de decidir.'
    : 'Ni con mejoras plausibles dentro de los rangos del sector sale viable: replantea precio, local o formato.');
  if (ctx.validacion.total > 0 && ctx.validacion.pct < 80) frases.push('Antes de dar pasos irreversibles, completa el checklist de riesgos (' + ctx.validacion.hechos + '/' + ctx.validacion.total + ').');
  return UI.el('section', { class:'inf-seccion' }, [
    UI.el('h2', null, '8 · Conclusiones'),
    UI.el('p', null, frases.join(' ')),
    UI.el('p', { class:'inf-nota' }, 'Estimaciones orientativas basadas en los datos introducidos y en rangos estándar del sector; no sustituyen un estudio profesional ni asesoramiento financiero.')
  ]);
};

Informe.SECCIONES = [Informe.sPortada, Informe.sResumen, Informe.sVeredicto, Informe.sEscenarios,
  Informe.sCostes, Informe.sSector, Informe.sPuntos, Informe.sPlan, Informe.sConclusiones];

if (typeof window !== 'undefined') window.Informe = Informe;

</script>
  <script>
'use strict';
const App = {};
App.state = Storage.cargar();

let guardarTimer = null;
App.guardarDebounced = function () {
  clearTimeout(guardarTimer);
  guardarTimer = setTimeout(() => Storage.guardar(App.state), 400);
};

App.proyectoActivo = () => App.state.proyectos.find(p => p.id === App.state.activoId) || App.state.proyectos[0];

App.crearProyecto = function (sectorId) {
  const base = Templates.crearDesdePlantilla(sectorId || 'generico');
  const p = Object.assign({ id: Storage.nuevoId() }, base);
  App.state.proyectos.push(p); App.state.activoId = p.id;
  Storage.guardar(App.state); App.render();
};
App.seleccionarProyecto = function (id) { App.state.activoId = id; Storage.guardar(App.state); App.render(); };
App.borrarProyecto = function (id) {
  if (!confirm('¿Borrar este proyecto?')) return;
  App.state.proyectos = App.state.proyectos.filter(p => p.id !== id);
  if (App.state.proyectos.length === 0) {
    App.state.activoId = null; App.modo = 'lista';
  } else if (App.state.activoId === id) {
    App.state.activoId = App.state.proyectos[0].id;
  }
  Storage.guardar(App.state); App.render();
};
App.duplicarProyecto = function (id) {
  const orig = App.state.proyectos.find(p => p.id === id); if (!orig) return;
  const copia = JSON.parse(JSON.stringify(orig));
  copia.id = Storage.nuevoId(); copia.nombre = orig.nombre + ' (versión B)';
  App.state.proyectos.push(copia); App.state.activoId = copia.id;
  Storage.guardar(App.state); App.render();
};

App.guardarComoPlantilla = function () {
  const p = App.proyectoActivo(); if (!p) return;
  const nombre = prompt('Nombre para tu plantilla (ej: "Mi tipo de bar")', p.nombre || 'Mi plantilla');
  if (nombre === null) return;
  const t = Templates.plantillaDesdeProyecto(p, nombre.trim() || 'Mi plantilla', Storage.nuevoId());
  App.state.plantillas = App.state.plantillas || [];
  App.state.plantillas.push(t);
  Storage.guardar(App.state); App.render();
  alert('Plantilla guardada. Ya aparece en el desplegable de sector.');
};
App.borrarPlantilla = function (id) {
  App.state.plantillas = (App.state.plantillas || []).filter(t => t.id !== id);
  Storage.guardar(App.state); App.render();
};
App.crearDesdePersonalizada = function (plantilla) {
  const p = Object.assign({ id: Storage.nuevoId() }, Templates.crearDesdePersonalizada(plantilla));
  App.state.proyectos.push(p); App.state.activoId = p.id;
  Storage.guardar(App.state); App.render();
};

App.cambiarOrden = function (modo) {
  App.state.ordenLista = (modo === 'beneficio') ? 'beneficio' : 'manual';
  Storage.guardar(App.state); App.renderOrden(); App.renderLista();
};

App.renderOrden = function () {
  const cont = document.getElementById('orden-lista'); if (!cont) return;
  cont.innerHTML = '';
  cont.style.display = App.state.proyectos.length ? 'flex' : 'none';
  if (!App.state.proyectos.length) return;
  const modo = App.state.ordenLista || 'manual';
  cont.appendChild(UI.el('span', { class:'orden-lista__etq muted' }, 'Ordenar:'));
  [['manual','Manual'], ['beneficio','Beneficio']].forEach(([val, etq]) => {
    cont.appendChild(UI.el('button', {
      class:'btn btn--seg' + (modo === val ? ' activa' : ''),
      onclick:() => App.cambiarOrden(val)
    }, etq));
  });
};

App.renderLista = function () {
  const cont = document.getElementById('lista-proyectos'); cont.innerHTML = '';
  Engine.ordenarProyectos(App.state.proyectos, App.state.ordenLista).forEach(p => {
    const tieneDatos = Engine.facturacionAnualBase(p.facturacion) > 0;
    const a = tieneDatos ? Engine.analyze(p) : null;
    const color = a ? a.verdict.color : 'neutro';
    const resumen = a
      ? UI.el('span', { class:'proyecto-item__benef' + (a.realista.beneficioNeto < 0 ? ' neg' : '') },
          (a.realista.beneficioNeto >= 0 ? '+' : '') + UI.eur(a.realista.beneficioNeto) + '/año')
      : UI.el('span', { class:'proyecto-item__benef' }, 'Sin datos');
    const item = UI.el('div', { class:'proyecto-item' + (p.id===App.state.activoId?' activo':''),
      onclick:() => App.abrirProyecto(p.id) }, [
      UI.el('span', { class:'punto punto--'+color }),
      UI.el('div', { class:'proyecto-item__info' }, [
        UI.el('div', { class:'proyecto-item__nombre' }, p.nombre || 'Sin nombre'),
        resumen
      ]),
      UI.el('div', { style:'display:flex;gap:6px' }, [
        UI.el('button', { class:'btn', title:'Duplicar como versión B',
          onclick:(e)=>{e.stopPropagation();App.duplicarProyecto(p.id);} }, '⧉'),
        UI.el('button', { class:'btn', title:'Borrar proyecto',
          onclick:(e)=>{e.stopPropagation();App.borrarProyecto(p.id);} }, '🗑')
      ])
    ]);
    cont.appendChild(item);
  });
  if (App.state.proyectos.length === 0) {
    cont.appendChild(UI.el('div', { class:'lista-vacia' }, [
      UI.el('div', { class:'lista-vacia__txt' }, 'Aún no tienes proyectos.'),
      UI.el('div', { class:'lista-vacia__sub muted' }, 'Pulsa «+ Nuevo proyecto» para empezar con el asistente paso a paso.')
    ]));
  }
  const btnComp = document.getElementById('btn-comparar');
  if (btnComp) {
    const pocos = App.state.proyectos.length < 2;
    btnComp.disabled = pocos;
    btnComp.title = pocos ? 'Necesitas al menos 2 proyectos para comparar' : 'Comparar proyectos';
  }
};

// Estado de navegación
App.modo = 'lista';                 // lista | proyecto | guia | comparador
App.tab  = 'datos';                 // datos | escenarios | riesgos

App.verLista     = function(){ App.modo='lista'; App.render(); };
App.abrirProyecto = function(id){ if (id) App.state.activoId = id; App.modo='proyecto'; App.tab='datos'; if (window.UI) { UI.escenarioSel='base'; UI.gastoAbierto=null; UI.zonaMasAbierto=false; UI.obsDetalleAbierto=null; UI.invDetalleAbierto=false; } Storage.guardar(App.state); App.render(); };
App.irATab       = function(tab){ App.tab = tab; App.render(); };
App.verComparador = function(){ App.modo='comparador'; if (window.UI) UI.comparadorSeleccion = App.state.proyectos.map(p=>p.id); App.render(); };
App.verProyecto   = function(){ App.modo='proyecto'; App.render(); };

// Nombre legible del sector para el subtítulo del detalle
App.nombreSector = function (project) {
  const s = (Templates.SECTORES || []).find(x => x.id === project.sector);
  if (s) return s.nombre;
  const t = (App.state.plantillas || []).find(t => ('personalizada:'+t.id) === project.sector);
  return t ? t.nombre : 'Personalizado';
};

// Re-pinta solo la pestaña activa (lo usan los handlers de ui.js)
App.renderTab = function () {
  const p = App.proyectoActivo();
  const panel = document.getElementById('panel-tab');
  if (App.tab === 'escenarios') UI.renderEscenarios(p, panel);
  else if (App.tab === 'zona') UI.renderZona(p, panel);
  else if (App.tab === 'campo') UI.renderObservaciones(p, panel);
  else if (App.tab === 'riesgos') UI.renderRiesgos(p, panel);
  else UI.renderDatos(p, panel);
};
App.refrescarTab = function () {
  // Re-renderizar destruye el input enfocado y se pierde el foco/cursor (había
  // que teclear dígito a dígito). Recordamos qué campo del panel tenía el foco
  // (por su posición) y el cursor, y lo restauramos tras volver a pintar.
  const panel = document.getElementById('panel-tab');
  const activo = document.activeElement;
  let idx = -1, caret = null, raw = null;
  if (panel && activo && panel.contains(activo) &&
      (activo.tagName === 'INPUT' || activo.tagName === 'TEXTAREA' || activo.tagName === 'SELECT')) {
    idx = Array.prototype.indexOf.call(panel.querySelectorAll('input, textarea, select'), activo);
    try { caret = activo.selectionStart; } catch (e) { caret = null; }
    // El repintado normaliza el valor desde el estado ("2," → "2") y rompe la
    // escritura de decimales: conservamos el texto tal cual se estaba tecleando.
    if (activo.tagName === 'INPUT' || activo.tagName === 'TEXTAREA') raw = activo.value;
  }

  if (App.modo === 'proyecto') App.renderTab();
  else App.render();

  if (idx >= 0) {
    const panel2 = document.getElementById('panel-tab');
    const el = panel2 && panel2.querySelectorAll('input, textarea, select')[idx];
    if (el) {
      if (raw != null && el.tagName !== 'SELECT') el.value = raw;
      el.focus();
      if (caret != null) { try { el.setSelectionRange(caret, caret); } catch (e) {} }
    }
  }
};

App.render = function () {
  const vistaLista = document.getElementById('vista-lista');
  const vistaDetalle = document.getElementById('vista-detalle');
  App.renderLista();
  App.renderOrden();
  if (App.modo !== 'lista' && !App.proyectoActivo()) App.modo = 'lista';

  if (App.modo === 'lista') {
    vistaLista.hidden = false; vistaDetalle.hidden = true;
    return;
  }

  // Cualquier modo que no sea 'lista' usa la vista detalle
  vistaLista.hidden = true; vistaDetalle.hidden = false;
  const head = document.querySelector('.detalle-head');
  const tabs = document.getElementById('tabs');

  if (App.modo === 'guia') { head.hidden = true; tabs.hidden = true; Guia.render(App.proyectoActivo()); return; }
  if (App.modo === 'comparador') { head.hidden = true; tabs.hidden = true; UI.renderComparador(); return; }

  // modo 'proyecto'
  head.hidden = false; tabs.hidden = false;
  const p = App.proyectoActivo();
  document.getElementById('detalle-nombre').textContent = p.nombre || 'Sin nombre';
  document.getElementById('detalle-sub').textContent = App.nombreSector(p);
  tabs.querySelectorAll('.tab').forEach(b => b.classList.toggle('activa', b.dataset.tab === App.tab));
  App.renderTab();
};

// Cableado de la cáscara
document.getElementById('btn-nuevo').addEventListener('click', () => {
  App.crearProyecto('generico');
  Guia.abrir();
});
document.getElementById('btn-comparar').addEventListener('click', App.verComparador);
document.getElementById('btn-volver').addEventListener('click', App.verLista);
document.getElementById('btn-borrar-detalle').addEventListener('click', () => App.borrarProyecto(App.state.activoId));
document.getElementById('tabs').addEventListener('click', (e) => {
  const t = e.target.closest('.tab'); if (t && t.dataset.tab) App.irATab(t.dataset.tab);
});
document.getElementById('btn-exportar').addEventListener('click', () => {
  const blob = new Blob([Storage.serializar(App.state)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href=url; a.download='simuladorx-backup.json'; a.click();
  URL.revokeObjectURL(url);
});
document.getElementById('btn-importar').addEventListener('click', () => document.getElementById('file-importar').click());
document.getElementById('file-importar').addEventListener('change', (e) => {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try {
      App.state = Storage.migrar(Storage.deserializar(reader.result));
      if (!App.state.activoId && App.state.proyectos[0]) App.state.activoId = App.state.proyectos[0].id;
      Storage.guardar(App.state); App.modo='lista'; App.render();
      alert('Datos importados correctamente.');
    } catch (err) { alert('El archivo no es válido.'); }
  };
  reader.readAsText(file);
});
document.addEventListener('DOMContentLoaded', App.render);
App.render();
if (typeof window !== 'undefined') window.App = App;

</script>
