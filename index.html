<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SimuladorX — ¿Es rentable mi negocio?</title>
  <style>
:root{
  --bg:#0b0c0e; --surface:#14151a; --surface2:#1a1c22; --border:#262932;
  --text:#e8e9ec; --muted:#868a93; --faint:#565a63;
  --accent:#4a90d9; --red:#e5564b; --green:#46c373; --amber:#d9a441;
  --radius:12px; --gap:16px;
  --font:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",system-ui,sans-serif;
}
*{box-sizing:border-box} html,body{margin:0;height:100%}
body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:15px;line-height:1.45}
#app{min-height:100vh}

/* ---- Vistas (lista / detalle) ---- */
.vista{max-width:1180px;margin:0 auto;padding:24px}
.vista[hidden]{display:none}

/* ---- Vista lista ---- */
.topbar{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:24px}
.topbar h1{font-size:20px;margin:0;letter-spacing:.01em}
.lista-proyectos{display:flex;flex-direction:column;gap:8px;margin-bottom:24px}
.proyecto-item{padding:14px 16px;border-radius:var(--radius);cursor:pointer;border:1px solid var(--border);
  background:var(--surface);display:flex;justify-content:space-between;align-items:center;gap:10px}
.proyecto-item:hover{background:var(--surface2);border-color:var(--faint)}
.proyecto-item.activo{border-color:var(--accent)}
.proyecto-item__info{display:flex;flex-direction:column;gap:2px;flex:1;min-width:0}
.proyecto-item__nombre{font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.proyecto-item__benef{font-size:13px;color:var(--muted)}
.proyecto-item__benef.neg{color:var(--red)}
.lista-acciones{display:flex;gap:8px;flex-wrap:wrap}

/* ---- Vista detalle ---- */
.detalle-head{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.detalle-titulo{flex:1;min-width:0}
.detalle-nombre{font-size:20px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.detalle-sub{font-size:13px;margin-top:2px}

/* ---- Barra de pestañas ---- */
.tabs{display:flex;gap:4px;border-bottom:1px solid var(--border);margin-bottom:20px;overflow-x:auto}
.tab{font-family:inherit;font-size:15px;padding:10px 16px;border:0;background:none;color:var(--muted);
  cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap;flex-shrink:0}
.tab:hover{color:var(--text)}
.tab.activa{color:var(--text);border-bottom-color:var(--accent)}
.tabs[hidden]{display:none}
.panel-tab{padding-bottom:40px}

/* ---- Botones ---- */
.btn{font-family:inherit;font-size:14px;padding:8px 14px;border-radius:10px;border:1px solid var(--border);
  background:var(--surface);color:var(--text);cursor:pointer}
.btn:hover{background:var(--surface2);border-color:var(--faint)}
.btn:disabled{opacity:.45;cursor:not-allowed}
.btn:disabled:hover{background:var(--surface);border-color:var(--border)}
.btn--accent{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn--accent:hover{background:#3f7fc4;border-color:#3f7fc4}
.btn--icono{padding:8px 12px;font-size:18px;line-height:1}

/* ---- Tarjetas y campos ---- */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:var(--gap)}
.card h2{font-size:12px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin:0 0 14px}
.field{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
.field label{font-size:13px;color:var(--muted)}
.field input,.field select,.field textarea{font-family:inherit;font-size:15px;padding:9px 11px;
  border:1px solid var(--border);border-radius:8px;background:var(--surface2);color:var(--text)}
.field input:focus,.field select:focus{outline:none;border-color:var(--accent)}
.field input::placeholder{color:var(--faint)}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.muted{color:var(--muted)}

/* ---- Veredicto / KPIs ---- */
.semaforo{display:flex;align-items:center;gap:12px;padding:18px;border-radius:var(--radius);
  border:1px solid var(--border);background:var(--surface2)}
.semaforo--verde{border-left:4px solid var(--green)}
.semaforo--ambar{border-left:4px solid var(--amber)}
.semaforo--rojo{border-left:4px solid var(--red)}
.semaforo--neutro{border-left:4px solid var(--faint)}
.kpi{font-size:26px;font-weight:600} .kpi--neg{color:var(--red)}

/* ---- Calendario ---- */
.cal-fila{display:grid;grid-template-columns:repeat(6,1fr);gap:6px}
.cal-mes{font-size:12px;padding:8px 4px;border-radius:8px;border:1px solid var(--border);
  cursor:pointer;background:var(--surface2);color:var(--text)}
.cal-B{border-color:var(--accent)} .cal-N{border-color:var(--border)} .cal-M{border-color:var(--red)}

/* ---- Barras / progreso ---- */
.barra-eq{height:14px;background:var(--surface2);border:1px solid var(--border);border-radius:7px;overflow:hidden;margin:8px 0}
.barra-eq__fill{height:100%;background:var(--accent)}

/* ---- Recomendaciones / checklist ---- */
.tip{cursor:help;color:var(--accent)}
.reco{padding:10px;border-radius:10px;margin-bottom:6px;border:1px solid var(--border);background:var(--surface2)}
.reco--alto{border-left:3px solid var(--red)}
.reco--medio{border-left:3px solid var(--accent)}
.reco--info{border-left:3px solid var(--faint)}
.check-item{display:flex;gap:8px;align-items:center;margin-bottom:8px;color:var(--text)}
.microayuda{font-size:12px;color:var(--muted);margin-top:2px}
.estimador{margin-top:8px;padding:12px;border:1px dashed var(--border);border-radius:10px;display:flex;flex-direction:column;gap:6px}

/* ---- Comparador ---- */
.tabla-comp{width:100%;border-collapse:collapse;margin-top:12px}
.tabla-comp th,.tabla-comp td{padding:8px;border-bottom:1px solid var(--border);text-align:left;font-size:14px}
.tabla-comp th{color:var(--muted);font-weight:600}
.tabla-comp .mejor{color:var(--accent);font-weight:600}
.punto{display:inline-block;width:12px;height:12px;border-radius:50%}
.punto--verde{background:var(--green)} .punto--ambar{background:var(--amber)} .punto--rojo{background:var(--red)} .punto--neutro{background:var(--faint)}

/* ---- Plan de acción ---- */
.card--plan{border-left:3px solid var(--accent)}
.accion{padding:10px;border-radius:10px;margin-bottom:6px;background:var(--surface2);border:1px solid var(--border);
  display:flex;justify-content:space-between;gap:12px;align-items:center}
.accion--alta{border-left:3px solid var(--accent)}
.accion--media{border-left:3px solid var(--faint)}
.accion__impacto{font-weight:600;color:var(--accent);white-space:nowrap}

/* ---- Selector de escenario (segmented) ---- */
.segmented{display:inline-flex;border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:16px}
.seg{font-family:inherit;font-size:14px;padding:8px 18px;border:0;background:var(--surface);color:var(--muted);
  cursor:pointer;border-right:1px solid var(--border)}
.seg:last-child{border-right:0}
.seg:hover{color:var(--text)}
.seg--activa{background:var(--accent);color:#fff}

/* ---- Rejilla de métricas ---- */
.metricas{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.metrica{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px}
.metrica__lab{font-size:12px;color:var(--muted);margin-bottom:4px}
.metrica__val{font-size:18px;font-weight:600}
.metrica__val.neg{color:var(--red)}

/* ---- Barras por temporada ---- */
.barra-temp{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.barra-temp__lab{width:72px;font-size:13px;color:var(--muted)}
.barra-temp__track{flex:1;height:22px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;overflow:hidden}
.barra-temp__fill{height:100%;background:var(--accent)}
.barra-temp__fill.neg{background:var(--red)}
.barra-temp__val{width:120px;text-align:right;font-size:13px}
.barra-temp__val.neg{color:var(--red)}

/* ---- Más detalle ---- */
.mas-detalle{margin-top:4px}
.mas-detalle>summary{cursor:pointer;color:var(--muted);font-size:14px;padding:8px 0;list-style:revert}
.mas-detalle[open]>summary{color:var(--text);margin-bottom:8px}

@media (max-width:1100px){.metricas{grid-template-columns:repeat(2,1fr)}}

/* ---- Riesgos (validación) ---- */
.riesgos-cab{display:flex;align-items:center;gap:18px}
.riesgos-cab__txt{display:flex;flex-direction:column;gap:4px}
.estado{align-self:flex-start;font-size:13px;padding:3px 12px;border-radius:20px;border:1px solid var(--border);color:var(--muted)}
.estado--listo{color:var(--green);border-color:var(--green)}
.riesgo-item{display:flex;gap:10px;align-items:flex-start;margin-bottom:10px;cursor:pointer}
.riesgo-item.hecho span{text-decoration:line-through;color:var(--faint)}

/* ---- Guía ---- */
.guia__prog{font-size:13px;color:var(--muted);margin-bottom:8px}
.guia__nav{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
.guia h2{font-size:18px;text-transform:none;letter-spacing:0;color:var(--text)}

@media (max-width:1100px){.grid-2,.grid-3{grid-template-columns:1fr}}
@media print{
  .topbar,.lista-acciones,.detalle-head,.tabs{display:none!important}
  .vista{max-width:none;padding:0}
  .card{break-inside:avoid;border:1px solid var(--border)}
  .btn{display:none!important}
}

.topbar__acciones { display:flex; gap:8px; align-items:center; }
.orden-lista { display:flex; align-items:center; gap:6px; padding:8px 0 4px; }
.orden-lista__etq { font-size:13px; }
.btn--seg { padding:4px 10px; font-size:13px; }
.btn--seg.activa { background:var(--accent); color:#fff; border-color:var(--accent); }
.lista-vacia { padding:40px 16px; text-align:center; border:1px dashed var(--border); border-radius:var(--radius); }
.lista-vacia__txt { font-size:16px; margin-bottom:6px; }
.lista-vacia__sub { font-size:14px; }
.comp-selector { display:flex; flex-wrap:wrap; gap:8px 16px; margin:12px 0; }
.comp-selector__item { display:flex; align-items:center; gap:6px; font-size:14px; cursor:pointer; }
.zona-factor { padding:10px 0; border-bottom:1px solid var(--border); }
.zona-factor:last-child { border-bottom:none; }
.zona-factor__top { display:flex; justify-content:space-between; align-items:baseline; gap:8px; }
.zona-factor__top label { font-size:15px; }
.zona-nota { font-size:14px; color:var(--muted); }
.zona-factor input[type=range] { width:100%; margin:6px 0; }
.zona-na { display:flex; align-items:center; gap:6px; font-size:13px; color:var(--muted); }

.chips{display:flex;gap:6px;flex-wrap:wrap}
.obs-fila__top{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.obs-fila__top input[type=date]{flex:1}
.obs-add{margin-top:8px}

/* ---- Veredicto hero ---- */
.vf-hero .semaforo{padding:22px 20px;margin-bottom:14px}
.vf-hero__titulo{font-size:30px;font-weight:700;line-height:1.15}
.vf-hero__motivo{font-size:15px;margin-top:6px}
.vf-hero__sub{font-size:12px;margin-top:4px}
.vf-dims{display:grid;grid-template-columns:1fr 1fr;gap:10px 18px;margin-top:12px}
.vf-dim{display:flex;align-items:baseline;gap:8px}
.vf-notas{margin-top:14px;display:flex;flex-direction:column;gap:6px}
@media (max-width:700px){.vf-dims{grid-template-columns:1fr}.vf-hero__titulo{font-size:26px}}
.vf-dim .punto{flex:none;position:relative;top:1px}

/* ---- Gastos fijos (acordeón) ---- */
.gasto{border:1px solid var(--border);border-radius:10px;margin-bottom:8px;background:var(--surface2);overflow:hidden}
.gasto--abierto{border-color:var(--accent)}
.gasto__cab{display:flex;align-items:center;gap:10px;width:100%;padding:12px 14px;border:0;background:none;
  color:var(--text);font-family:inherit;font-size:15px;cursor:pointer;text-align:left}
.gasto__cab:hover{background:var(--surface)}
.gasto__nombre{flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.gasto__nombre.vacio{color:var(--faint);font-style:italic}
.gasto__resumen{font-size:14px;color:var(--muted);white-space:nowrap}
.gasto__resumen.vacio{color:var(--faint)}
.gasto__chev{color:var(--faint);font-size:11px}
.gasto__ficha{padding:8px 14px 12px;border-top:1px solid var(--border)}
.gasto__acciones{display:flex;gap:8px;align-items:center;justify-content:space-between;margin:4px 0 8px}
.total-gastos{margin-top:10px;font-size:15px;font-weight:600}

/* ---- Informe profesional (tema claro autocontenido, prefijo .inf-) ---- */
.btn--informe{display:block;width:100%;margin-top:16px;padding:12px;font-size:15px}
.inf-overlay{position:fixed;inset:0;background:#565a63;overflow-y:auto;z-index:100;padding:0 0 40px}
.inf-barra{position:sticky;top:0;z-index:2;display:flex;justify-content:space-between;gap:8px;padding:10px 16px;background:#2b2e35;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.inf-doc{max-width:820px;margin:16px auto 0;background:#fff;color:#1c1e21;padding:56px 60px;border-radius:4px;box-shadow:0 6px 28px rgba(0,0,0,.4);font-size:14px;line-height:1.55}
.inf-doc h1{font-size:34px;margin:0 0 6px;color:#1c1e21}
.inf-doc h2{font-size:19px;margin:0 0 14px;padding-bottom:6px;border-bottom:2px solid #1c1e21;color:#1c1e21;text-transform:none;letter-spacing:0}
.inf-doc h3{font-size:15px;margin:18px 0 8px;color:#1c1e21}
.inf-doc p{margin:0 0 10px}
.inf-seccion{margin-bottom:36px}
.inf-suave{color:#5f6570}
.inf-neg{color:#c62828}
.inf-alerta{color:#c62828;font-weight:600}
.inf-nota{font-size:12px;color:#8a8f98;border-top:1px solid #e4e6ea;padding-top:10px;margin-top:18px}
.inf-punto{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:6px;flex:none}
.inf-portada{display:flex;flex-direction:column;justify-content:center;min-height:70vh;text-align:center;gap:6px}
.inf-portada__marca{font-size:13px;letter-spacing:3px;text-transform:uppercase;color:#8a8f98}
.inf-portada__sub{font-size:16px;color:#5f6570}
.inf-portada__fecha{font-size:13px;color:#8a8f98;margin-bottom:28px}
.inf-portada__veredicto{display:inline-flex;align-items:center;justify-content:center;gap:10px;margin:0 auto;padding:12px 28px;border:2px solid;border-radius:40px;font-size:20px;font-weight:700}
.inf-portada__pie{margin-top:48px;font-size:12px;color:#8a8f98}
.inf-inds{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:14px}
.inf-ind{border:1px solid #e4e6ea;border-radius:8px;padding:10px 12px;text-align:center}
.inf-ind__val{font-size:18px;font-weight:700}
.inf-ind--mal .inf-ind__val{color:#c62828}
.inf-ind__etq{font-size:11px;color:#5f6570;margin-top:2px}
.inf-tabla{width:100%;border-collapse:collapse;margin:10px 0 14px;font-size:13px}
.inf-tabla th{text-align:left;border-bottom:2px solid #1c1e21;padding:6px 8px;font-size:12px}
.inf-tabla td{border-bottom:1px solid #e4e6ea;padding:6px 8px}
.inf-sem{display:inline-flex;align-items:center;font-size:12px;color:#5f6570}
.inf-lista{margin:0 0 10px;padding-left:20px}
.inf-lista li{margin-bottom:5px}
@media (max-width:700px){
  .inf-doc{padding:28px 18px;margin:0}
  .inf-inds{grid-template-columns:repeat(2,1fr)}
}

.inf-veredicto{display:flex;gap:24px;align-items:flex-start;justify-content:space-between}
.inf-veredicto__titulo{font-size:22px;font-weight:700;margin-bottom:4px}
.inf-dims{display:flex;flex-direction:column;gap:6px;margin-top:10px}
.inf-dim{display:flex;align-items:baseline;gap:4px}
.inf-riesgo__aro{text-align:center;flex:none}
.inf-riesgo__banda{font-weight:700;margin-top:2px}
.inf-riesgo__comp{margin-top:18px;display:grid;grid-template-columns:1fr 1fr;gap:8px 20px}
.inf-comp__etq{font-size:12px;font-weight:600}
.inf-comp__track{height:6px;background:#eceef1;border-radius:3px;margin:3px 0}
.inf-comp__fill{height:100%;background:#b26a00;border-radius:3px}
.inf-comp__txt{font-size:11px;color:#5f6570}
.inf-antes-despues{display:flex;align-items:center;justify-content:center;gap:18px;margin:16px 0}
.inf-ad__caja{border:1px solid #e4e6ea;border-radius:8px;padding:12px 22px;text-align:center}
.inf-ad__caja .inf-ind__val{font-size:20px}
.inf-ad__flecha{font-size:24px;color:#5f6570}

@media (max-width:700px){
  .inf-veredicto{flex-direction:column}
  .inf-riesgo__comp{grid-template-columns:1fr}
}

/* ---- Impresión del informe (A4) ---- */
@page{size:A4;margin:16mm}
@media print{
  body.informe-abierto #app{display:none!important}
  body.informe-abierto{background:#fff}
  body.informe-abierto .inf-overlay{position:static;overflow:visible;padding:0;background:#fff}
  .inf-doc{max-width:none;margin:0;padding:0;box-shadow:none;border-radius:0}
  .inf-barra,.no-print{display:none!important}
  .inf-seccion{break-inside:avoid}
  .inf-portada{break-after:page;min-height:auto;padding:120px 0}
  .inf-plan{break-before:page}
}

</style>
</head>
<body>
  <div id="app">
    <!-- Vista raíz: lista de proyectos -->
    <section id="vista-lista" class="vista">
      <header class="topbar">
        <h1>SimuladorX</h1>
        <div class="topbar__acciones">
          <button id="btn-comparar" class="btn">Comparar</button>
          <button id="btn-nuevo" class="btn btn--accent">+ Nuevo proyecto</button>
        </div>
      </header>
      <div id="orden-lista" class="orden-lista"></div>
      <nav id="lista-proyectos" class="lista-proyectos"></nav>
      <footer class="lista-acciones">
        <button id="btn-exportar" class="btn">Exportar</button>
        <button id="btn-importar" class="btn">Importar</button>
        <input id="file-importar" type="file" accept="application/json" hidden>
      </footer>
    </section>

    <!-- Vista detalle: un proyecto, con pestañas -->
    <section id="vista-detalle" class="vista" hidden>
      <header class="detalle-head">
        <button id="btn-volver" class="btn btn--icono" title="Volver a la lista">‹</button>
        <div class="detalle-titulo">
          <div id="detalle-nombre" class="detalle-nombre"></div>
          <div id="detalle-sub" class="detalle-sub muted"></div>
        </div>
        <button id="btn-borrar-detalle" class="btn btn--icono" title="Borrar proyecto">🗑</button>
      </header>
      <nav class="tabs" id="tabs">
        <button class="tab" data-tab="datos">Datos</button>
        <button class="tab" data-tab="zona">Zona</button>
        <button class="tab" data-tab="campo">Campo</button>
        <button class="tab" data-tab="riesgos">Riesgos</button>
        <button class="tab" data-tab="escenarios">Resultado</button>
      </nav>
      <main id="panel-tab" class="panel-tab"></main>
    </section>
  </div>
  <script>
'use strict';

const Engine = {};

Engine.MESES = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];

// Parser tolerante para inputs de usuario: acepta formato español.
// Con coma, los puntos anteriores son separadores de miles ("1.234,56" → 1234.56).
// Sin coma, los puntos son miles SOLO si agrupan de 3 en 3 ("12.000" → 12000,
// "1.234.567" → 1234567); si no, el punto es decimal ("3.15" → 3.15, "1.2345" → 1.2345).
Engine.parseNum = function (v) {
  if (typeof v === 'number') return isFinite(v) ? v : 0;
  let s = String(v == null ? '' : v).trim();
  if (s.includes(',')) s = s.replace(/\./g, '').replace(',', '.');
  else if (/^\d{1,3}(\.\d{3})+$/.test(s)) s = s.replace(/\./g, '');
  const n = parseFloat(s);
  return isNaN(n) ? 0 : n;
};

Engine.proyectoVacio = function () {
  return {
    nombre: 'Nuevo proyecto',
    sector: 'generico',
    facturacion: { mesBueno: 0, nBuenos: 0, mesNormal: 0, nNormales: 12, mesMalo: 0, nMalos: 0 },
    margen: { modo: 'global', costeMercanciaPct: 0, productos: [], categorias: [] },
    mermaPct: 0,
    costesFijos: [],
    inversionInicial: 0,
    impuestoPct: 0,
    ivaPct: 21,
    propietario: { sueldoMes: 0, horasSemana: 0 },
    operativa: { ticketMedio: 0, diasAbiertosSemana: 6, unidadCliente: 'clientes', horasAbiertasDia: 0, personasSimultaneas: 1 },
    empleados: [],
    ssPct: 31,
    calendario: Array(12).fill('N'),
    escenarios: { optimistaPct: 15, pesimistaPct: 20 },
    prosContras: { pros: '', contras: '' },
    costesOlvidadosMarcados: [],
    riesgosMarcados: [],
    zona: { factores: {} },
    observaciones: [],
    observacionesParams: { horasDia: 10, diasMes: 26 },
    refuerzos: []
  };
};

Engine.costeMercanciaPct = function (margen) {
  if (!margen) return 0;
  if (margen.modo === 'productos' && Array.isArray(margen.productos) && margen.productos.length) {
    let num = 0, den = 0;
    for (const p of margen.productos) {
      if (!p.precio) continue;
      num += (p.coste / p.precio) * 100 * (Number(p.pesoPct) || 0);
      den += (Number(p.pesoPct) || 0);
    }
    return den > 0 ? num / den : 0;
  }
  if (margen.modo === 'categorias' && Array.isArray(margen.categorias) && margen.categorias.length) {
    let num = 0, den = 0;
    for (const c of margen.categorias) {
      num += (Number(c.costeMercanciaPct) || 0) * (Number(c.pesoPct) || 0);
      den += (Number(c.pesoPct) || 0);
    }
    if (den > 0) return num / den;
    // sin pesos: cae al global (default prudente, mejor que un 0% = margen 100%)
  }
  return Number(margen.costeMercanciaPct) || 0;
};

Engine.costeEmpleado = function (emp, ssPct) {
  const numero = Number(emp && emp.numero) || 0;
  const sueldo = Number(emp && emp.sueldoBrutoMes) || 0;
  const ss = Number(ssPct) || 0;
  const brutoAnual = numero * sueldo * 14;
  const ssImporte = brutoAnual * ss / 100;
  const costeAnual = brutoAnual * (1 + ss/100);
  return { brutoAnual, ss: ssImporte, costeAnual, costeMes: costeAnual/12 };
};

Engine.costeRefuerzo = function (ref, ssPct) {
  const r = ref || {};
  const horas = Number(r.horasSemana) || 0;
  const eur = Number(r.eurHora) || 0;
  const semanas = Number(r.semanasAnio) || 0;
  const ss = Number(ssPct) || 0;
  const costeAnual = horas * eur * semanas * (1 + ss / 100);
  return { costeAnual, costeMes: costeAnual / 12 };
};

Engine.costeRefuerzosMensual = function (project) {
  const ssPct = Number(project && project.ssPct) || 0;
  return ((project && project.refuerzos) || []).reduce((s, r) => s + Engine.costeRefuerzo(r, ssPct).costeMes, 0);
};

Engine.costePersonalMensual = function (project) {
  const ssPct = Number(project.ssPct) || 0;
  const empleados = (project.empleados || []).reduce((s, e) => s + Engine.costeEmpleado(e, ssPct).costeMes, 0);
  return empleados + Engine.costeRefuerzosMensual(project);
};

Engine.costePersonalAnual = function (project) {
  return Engine.costePersonalMensual(project) * 12;
};

Engine.coberturaEmpleados = function (opts) {
  const o = opts || {};
  const horasDia = Number(o.horasAbiertasDia) || 0;
  const dias = Number(o.diasSemana) || 0;
  const personas = Number(o.personasSimultaneas) || 0;
  const jornada = Number(o.jornadaHoras) || 40;
  const horasSemana = horasDia * dias * personas;
  const empleadosNecesarios = (jornada > 0 && horasSemana > 0) ? Math.ceil(horasSemana / jornada) : 0;
  return { horasSemana, empleadosNecesarios };
};

Engine.sueldoBajoSMI = function (emp, smiMensual, jornadaHoras) {
  const horas = Number(emp && emp.horasSemana) || 0;
  const jornada = Number(jornadaHoras) || 40;
  if (horas <= 0) return false;
  const smiProporcional = (Number(smiMensual)||0) * horas / jornada;
  return (Number(emp && emp.sueldoBrutoMes)||0) < smiProporcional - 1e-9;
};

Engine.facturacionAnualBase = function (f) {
  if (!f) return 0;
  return (f.mesBueno||0)*(f.nBuenos||0) + (f.mesNormal||0)*(f.nNormales||0) + (f.mesMalo||0)*(f.nMalos||0);
};

// Factor de escala de un gasto según su tipo en un escenario con multiplicador m.
// Prudencia: tipo ausente/desconocido = 'fijo' (no baja en pesimista).
Engine.escalaCoste = function (tipo, m) {
  const mult = Number(m);
  if (!isFinite(mult)) return 1;
  if (tipo === 'variable') return mult;
  if (tipo === 'semi') return 1 + (mult - 1) / 2;
  return 1;
};

Engine.costesFijosMensuales = function (project, m) {
  const lista = (project.costesFijos || []).reduce(
    (s, c) => s + (Number(c.importe) || 0) * Engine.escalaCoste(c.tipo, m == null ? 1 : m), 0);
  const sueldo = project.propietario ? (Number(project.propietario.sueldoMes)||0) : 0;
  return lista + sueldo + Engine.costePersonalMensual(project);
};

Engine.computeScenario = function (project, m) {
  const facturacion = Engine.facturacionAnualBase(project.facturacion) * m;
  const cmPct = Engine.costeMercanciaPct(project.margen);
  const mermaPct = Number(project.mermaPct) || 0;
  const costeMercancia = facturacion * cmPct/100;
  const merma = facturacion * mermaPct/100;
  const margenContribucionPct = 100 - cmPct - mermaPct;
  const margenBruto = facturacion - costeMercancia - merma;
  const margenBrutoPct = facturacion ? margenBruto/facturacion*100 : 0;
  const costesFijosAnuales = Engine.costesFijosMensuales(project, m) * 12;
  const beneficioAntesImp = margenBruto - costesFijosAnuales;
  const impuestos = Math.max(0, beneficioAntesImp) * (Number(project.impuestoPct)||0)/100;
  const beneficioNeto = beneficioAntesImp - impuestos;
  const margenNetoPct = facturacion ? beneficioNeto/facturacion*100 : 0;
  return { multiplicador:m, facturacion, costeMercanciaPct:cmPct, costeMercancia, mermaPct, merma,
    margenContribucionPct, margenBruto, margenBrutoPct, costesFijosAnuales,
    costePersonalAnual: Engine.costePersonalAnual(project),
    beneficioAntesImp, impuestos, beneficioNeto, margenNetoPct, beneficioMensual: beneficioNeto/12 };
};

Engine.breakeven = function (project) {
  const cmPct = Engine.costeMercanciaPct(project.margen);
  const mermaPct = Number(project.mermaPct) || 0;
  const margenContribucionPct = 100 - cmPct - mermaPct;
  const costesFijosAnuales = Engine.costesFijosMensuales(project) * 12;
  const breakevenAnual = margenContribucionPct > 0
    ? costesFijosAnuales / (margenContribucionPct/100) : Infinity;
  const realista = Engine.facturacionAnualBase(project.facturacion);
  const margenSeguridadPct = (realista > 0 && isFinite(breakevenAnual))
    ? (realista - breakevenAnual) / realista * 100 : -Infinity;
  const op = project.operativa || {};
  const diasAbiertosAnio = (Number(op.diasAbiertosSemana)||0) * 52;
  const clientesDiaEquilibrio = (op.ticketMedio > 0 && diasAbiertosAnio > 0 && isFinite(breakevenAnual))
    ? breakevenAnual / op.ticketMedio / diasAbiertosAnio : null;
  return { margenContribucionPct, breakevenAnual, margenSeguridadPct, clientesDiaEquilibrio };
};

Engine.inversion = function (project, beneficioNetoRealista) {
  const inv = Number(project.inversionInicial) || 0;
  if (inv <= 0) return null;
  const paybackAnios = beneficioNetoRealista > 0 ? inv / beneficioNetoRealista : Infinity;
  const roiPct = beneficioNetoRealista / inv * 100;
  return { inversionInicial: inv, paybackAnios, roiPct };
};

Engine.euroHoraReal = function (project, beneficioNetoRealista) {
  const p = project.propietario || {};
  const horasAnio = (Number(p.horasSemana)||0) * 48; // 48 semanas trabajadas
  if (horasAnio <= 0) return { horasAnio: 0, euroHoraReal: null };
  const total = (Number(p.sueldoMes)||0) * 12 + beneficioNetoRealista;
  return { horasAnio, euroHoraReal: total / horasAnio };
};

Engine.cashflow = function (project, m) {
  const f = project.facturacion || {};
  const valorMes = { B: (f.mesBueno||0), N: (f.mesNormal||0), M: (f.mesMalo||0) };
  const cmPct = Engine.costeMercanciaPct(project.margen);
  const mermaPct = Number(project.mermaPct) || 0;
  const margenContribucionPct = 100 - cmPct - mermaPct;
  const sc = Engine.computeScenario(project, m);
  const costesFijosMes = sc.costesFijosAnuales / 12;
  const impuestosMes = sc.impuestos / 12;
  const cal = (project.calendario && project.calendario.length === 12) ? project.calendario : Array(12).fill('N');
  const cajaMes = cal.map(t => (valorMes[t]||0) * m * margenContribucionPct/100 - costesFijosMes - impuestosMes);
  const acumulada = [];
  let run = -(Number(project.inversionInicial)||0);
  let minPoint = run, minMonth = -1;
  cajaMes.forEach((c, i) => { run += c; acumulada.push(run); if (run < minPoint) { minPoint = run; minMonth = i; } });
  return { cajaMes, acumulada, colchonNecesario: Math.max(0, -minPoint), puntoMasBajoMes: minMonth };
};

Engine.ivaTrimestralAprox = function (scenario, ivaPct) {
  return (scenario.facturacion - scenario.costeMercancia) * (Number(ivaPct)||0)/100 / 4;
};

Engine.verdict = function (a) {
  const real = a.realista, be = a.breakeven, pes = a.pesimista;
  if (real.beneficioNeto <= 0 || !isFinite(be.breakevenAnual) || be.margenSeguridadPct < 0) {
    return { color:'rojo', titulo:'No rentable / muy arriesgado',
      motivo:'En el escenario realista no ganas dinero o tu punto de equilibrio queda por encima de lo que esperas facturar.' };
  }
  if (pes.beneficioNeto < 0 || be.margenSeguridadPct < 15) {
    return { color:'ambar', titulo:'Rentable pero ajustado',
      motivo:'Ganas en lo realista, pero en un mal año entras en pérdidas o tu colchón de seguridad es pequeño.' };
  }
  return { color:'verde', titulo:'Rentable y con margen',
    motivo:'Ganas en lo realista y aguantas un mal año sin entrar en pérdidas.' };
};

Engine.recomendaciones = function (project, a) {
  const out = [];
  const be = a.breakeven, real = a.realista, pes = a.pesimista;
  const eur = n => Math.round(n).toLocaleString('es-ES');

  if (isFinite(be.breakevenAnual) && a.base > 0) {
    const pct = be.breakevenAnual / a.base * 100;
    if (pct > 85) out.push({ nivel:'alto',
      texto:`Tu punto de equilibrio está al ${pct.toFixed(0)}% de tu facturación realista: cualquier mes flojo te mete en pérdidas.` });
  }
  if (pes.beneficioNeto < 0) out.push({ nivel:'alto',
    texto:`En el escenario pesimista pierdes ${eur(-pes.beneficioNeto)} €/año. Necesitas un colchón de tesorería para aguantarlo.` });
  if (a.cashflow.colchonNecesario > 0) out.push({ nivel:'medio',
    texto:`Necesitas tener guardados ~${eur(a.cashflow.colchonNecesario)} € para no quedarte sin caja en los meses malos.` });
  const tieneSueldo = project.propietario && Number(project.propietario.sueldoMes) > 0;
  if (!tieneSueldo) out.push({ nivel:'alto',
    texto:'No has incluido tu propio sueldo: el beneficio real es menor de lo que parece.' });
  if (a.propietario.euroHoraReal !== null && a.propietario.euroHoraReal < 8) out.push({ nivel:'medio',
    texto:`Tu tiempo te renta ${a.propietario.euroHoraReal.toFixed(2)} €/hora. Plantéate si compensa tantas horas.` });
  if (a.inversion && isFinite(a.inversion.paybackAnios) && a.inversion.paybackAnios > 5) out.push({ nivel:'medio',
    texto:`Tardarías ${a.inversion.paybackAnios.toFixed(1)} años en recuperar la inversión: es un retorno lento.` });
  if (real.beneficioNeto > 0 && pes.beneficioNeto >= 0) out.push({ nivel:'info',
    texto:'Aguantas un año malo sin pérdidas: buena señal de solidez.' });
  return out;
};

Engine.analyze = function (project) {
  const esc = project.escenarios || { optimistaPct:15, pesimistaPct:20 };
  const optimista = Engine.computeScenario(project, 1 + (Number(esc.optimistaPct)||0)/100);
  const realista  = Engine.computeScenario(project, 1);
  const pesimista = Engine.computeScenario(project, 1 - (Number(esc.pesimistaPct)||0)/100);
  const a = {
    base: Engine.facturacionAnualBase(project.facturacion),
    optimista, realista, pesimista,
    breakeven: Engine.breakeven(project),
    inversion: Engine.inversion(project, realista.beneficioNeto),
    propietario: Engine.euroHoraReal(project, realista.beneficioNeto),
    cashflow: Engine.cashflow(project, 1),
    iva: { trimestralAprox: Engine.ivaTrimestralAprox(realista, project.ivaPct) },
    recomendaciones: []
  };
  a.verdict = Engine.verdict(a);
  a.recomendaciones = Engine.recomendaciones ? Engine.recomendaciones(project, a) : [];
  return a;
};

Engine.objetivos = function (project, a, benchmarks) {
  const b = benchmarks || { costeMercanciaPct:[20,40], mermaPct:[0,5], alquilerSobreVentasPct:[5,12], paybackAnios:[2,5], personalSobreVentasPct:[0,35] };
  const out = [];
  const eur = n => Math.round(n).toLocaleString('es-ES');
  const real = a.realista;
  const facturacion = real.facturacion;

  // Facturación mínima (cubrir el equilibrio)
  if (isFinite(a.breakeven.breakevenAnual) && a.base > 0 && a.base < a.breakeven.breakevenAnual) {
    const faltanMes = (a.breakeven.breakevenAnual - a.base) / 12;
    out.push({ clave:'facturacion_minima', prioridad:'alta', impactoAnual:null,
      texto:`Para no perder necesitas facturar ${eur(a.breakeven.breakevenAnual/12)} €/mes; hoy estimas ${eur(a.base/12)} → te faltan ${eur(faltanMes)} €/mes.` });
  }

  // Coste de mercancía por encima del rango del sector
  const cmPct = real.costeMercanciaPct;
  const topeCM = b.costeMercanciaPct[1];
  if (cmPct > topeCM && facturacion > 0) {
    const ahorro = (cmPct - topeCM)/100 * facturacion;
    out.push({ clave:'coste_mercancia', prioridad:'alta', impactoAnual: ahorro,
      texto:`Tu coste de mercancía (${cmPct.toFixed(0)}%) está por encima de lo normal del sector (${b.costeMercanciaPct[0]}-${topeCM}%). Bajándolo al ${topeCM}% ganarías +${eur(ahorro)} €/año.` });
  }

  // Alquiler por encima del recomendado
  const alquiler = (project.costesFijos || []).find(c => /alquiler/i.test(c.concepto || ''));
  if (alquiler && facturacion > 0) {
    const maxMes = b.alquilerSobreVentasPct[1]/100 * facturacion/12;
    if ((Number(alquiler.importe)||0) > maxMes) {
      const exceso = ((Number(alquiler.importe)||0) - maxMes) * 12;
      out.push({ clave:'alquiler', prioridad:'media', impactoAnual: exceso,
        texto:`Tu alquiler (${eur(alquiler.importe)} €/mes) es alto para tus ventas. Para este nivel no debería pasar de ${eur(maxMes)} €/mes.` });
    }
  }

  // Sueldo del propietario ausente
  const tieneSueldo = project.propietario && Number(project.propietario.sueldoMes) > 0;
  if (!tieneSueldo) {
    out.push({ clave:'sueldo_propietario', prioridad:'alta', impactoAnual:null,
      texto:'Incluye tu propio sueldo: el beneficio real es menor de lo que parece hasta que te pagas a ti.' });
  }

  // Personal por encima del % de ventas del sector
  const personalAnual = Engine.costePersonalAnual(project);
  const topePersonal = (b.personalSobreVentasPct && b.personalSobreVentasPct[1] != null) ? b.personalSobreVentasPct[1] : 35;
  if (facturacion > 0 && personalAnual > 0) {
    const pctPersonal = personalAnual / facturacion * 100;
    if (pctPersonal > topePersonal) {
      out.push({ clave:'personal_alto', prioridad:'media', impactoAnual:null,
        texto:`El personal se come el ${pctPersonal.toFixed(0)}% de tus ventas (lo normal en tu sector es hasta ${topePersonal}%). Revisa plantilla u horas.` });
    }
  }

  // Colchón de tesorería
  if (a.cashflow.colchonNecesario > 0) {
    out.push({ clave:'colchon', prioridad:'media', impactoAnual:null,
      texto:`Ten guardados ~${eur(a.cashflow.colchonNecesario)} € de colchón para aguantar los meses malos sin quedarte sin caja.` });
  }

  // Orden: por impacto € desc; los null al final (por prioridad alta>media)
  const peso = { alta:0, media:1 };
  out.sort((x, y) => {
    if (x.impactoAnual != null && y.impactoAnual != null) return y.impactoAnual - x.impactoAnual;
    if (x.impactoAnual != null) return -1;
    if (y.impactoAnual != null) return 1;
    return (peso[x.prioridad]||9) - (peso[y.prioridad]||9);
  });
  return out;
};

Engine.resultadoPorTemporada = function (project, m) {
  const mult = (m == null) ? 1 : Number(m);
  const cmPct = Engine.costeMercanciaPct(project.margen);
  const mermaPct = Number(project.mermaPct) || 0;
  const margenContribucionPct = 100 - cmPct - mermaPct;
  const costesFijosMes = Engine.costesFijosMensuales(project, mult);
  const f = project.facturacion || {};
  const benefMes = (facturacionTipo) =>
    (Number(facturacionTipo) || 0) * mult * margenContribucionPct / 100 - costesFijosMes;
  return {
    fuertes: { benefMes: benefMes(f.mesBueno) },
    medios:  { benefMes: benefMes(f.mesNormal) },
    flojos:  { benefMes: benefMes(f.mesMalo) }
  };
};

Engine.personalSobreVentas = function (project) {
  const costeMes = Engine.costePersonalMensual(project);
  const f = project.facturacion || {};
  const ratio = (facturacionTipo) => {
    const fac = Number(facturacionTipo) || 0;
    return fac > 0 ? costeMes / fac * 100 : 0;
  };
  return { verano: ratio(f.mesBueno), invierno: ratio(f.mesMalo) };
};

Engine.semanasTemporadaFuerte = function (project) {
  const nBuenos = Number(project && project.facturacion && project.facturacion.nBuenos) || 0;
  return Math.round(nBuenos * 52 / 12);
};

Engine.validacionRiesgos = function (project, catalogo) {
  const cat = Array.isArray(catalogo) ? catalogo : [];
  const ids = [];
  cat.forEach(c => (c.items || []).forEach(it => ids.push(it.id)));
  const marcados = Array.isArray(project && project.riesgosMarcados) ? project.riesgosMarcados : [];
  const total = ids.length;
  const hechos = ids.filter(id => marcados.includes(id)).length;
  const pct = total > 0 ? hechos / total * 100 : 0;
  const estado = pct >= 80 ? 'Listo' : 'En validación';
  return { total, hechos, pct, estado };
};

Engine.ordenarProyectos = function (proyectos, modo) {
  const lista = (proyectos || []).slice();
  if (modo !== 'beneficio') return lista;
  const conDatos = [], sinDatos = [];
  lista.forEach(p => {
    if (Engine.facturacionAnualBase(p.facturacion) > 0) conDatos.push(p);
    else sinDatos.push(p);
  });
  conDatos.sort((a, b) =>
    Engine.analyze(b).realista.beneficioNeto - Engine.analyze(a).realista.beneficioNeto);
  return conDatos.concat(sinDatos);
};

Engine.veredictoZona = function (zona, catalogo) {
  const cat = catalogo || [];
  const factores = (zona && zona.factores) || {};
  const valorados = [];
  cat.forEach(f => {
    const v = factores[f.clave];
    if (typeof v === 'number' && v >= 1 && v <= 10) valorados.push({ clave:f.clave, etiqueta:f.etiqueta, nota:v });
  });
  const nTotal = cat.length;
  const nValorados = valorados.length;
  if (nValorados === 0) return { nTotal, nValorados:0, media:null, nivel:'sin_datos', color:'neutro', debilidades:[] };
  const media = valorados.reduce((s, x) => s + x.nota, 0) / nValorados;
  let nivel, color;
  if (media >= 7) { nivel = 'fuerte'; color = 'verde'; }
  else if (media >= 4) { nivel = 'media'; color = 'ambar'; }
  else { nivel = 'peligrosa'; color = 'rojo'; }
  const debilidades = valorados.filter(x => x.nota <= 4).sort((a, b) => a.nota - b.nota).slice(0, 3);
  return { nTotal, nValorados, media, nivel, color, debilidades };
};

Engine.eurHoraObs = function (f) {
  if (!f || typeof f !== 'object') return null;
  const num = (x) => (x === '' || x === null || typeof x === 'undefined') ? NaN : Number(x);
  if (f.metodo === 'B') {
    const e = num(f.eurHora);
    return (isFinite(e) && e >= 0) ? e : null;
  }
  const v = num(f.ventanaMin), c = num(f.conteo), t = num(f.ticket);
  if (!isFinite(v) || v <= 0) return null;
  if (!isFinite(c) || c < 0) return null;
  if (!isFinite(t) || t < 0) return null;
  return (c / v) * 60 * t;
};

Engine.resumenObservaciones = function (observaciones, params, project) {
  const lista = Array.isArray(observaciones) ? observaciones : [];
  const p = params || {};
  const horasDia = Number(p.horasDia) || 0;
  const diasMes = Number(p.diasMes) || 0;
  const mesMedioDatos = (project && project.facturacion && Number(project.facturacion.mesNormal)) || 0;
  const validas = [], fechas = [], franjas = {};
  lista.forEach(f => {
    const eh = Engine.eurHoraObs(f);
    if (eh != null) {
      validas.push(eh);
      if (f && f.fecha) fechas.push(f.fecha);
      if (f && f.franja) franjas[f.franja] = 1;
    }
  });
  const n = validas.length;
  const franjasDistintas = Object.keys(franjas).length;
  if (n === 0) {
    return { n: 0, fechaDesde: null, fechaHasta: null, mediaEurHora: null, cajaDia: 0, cajaMesObs: 0,
      mesMedioDatos, desviacionPct: null, fiabilidad: 'sin_datos', franjasDistintas: 0 };
  }
  const mediaEurHora = validas.reduce((s, x) => s + x, 0) / n;
  const cajaDia = mediaEurHora * horasDia;
  const cajaMesObs = cajaDia * diasMes;
  const desviacionPct = mesMedioDatos ? (cajaMesObs - mesMedioDatos) / mesMedioDatos : null;
  fechas.sort();
  let fiabilidad;
  if (n >= 5 && franjasDistintas >= 3) fiabilidad = 'alta';
  else if (n >= 3 && franjasDistintas >= 2) fiabilidad = 'media';
  else fiabilidad = 'baja';
  return { n, fechaDesde: fechas[0] || null, fechaHasta: fechas[fechas.length - 1] || null,
    mediaEurHora, cajaDia, cajaMesObs, mesMedioDatos, desviacionPct, fiabilidad, franjasDistintas };
};

// Veredicto final: combina dinero + zona + observado + personal + validación.
// Prudencia: el dinero fija el punto de partida y las demás señales SOLO pueden
// rebajarlo. Sin datos = neutro (no castiga por no usar una función opcional).
Engine.veredictoFinal = function (project, opts) {
  const o = opts || {};
  const catZona = o.catalogoZona || [];
  const catRiesgos = o.catalogoRiesgos || [];
  const topePersonal = (o.topePersonal != null && isFinite(Number(o.topePersonal))) ? Number(o.topePersonal) : 35;

  const a = Engine.analyze(project);
  const zona = Engine.veredictoZona(project.zona, catZona);
  const obs = Engine.resumenObservaciones(project.observaciones, project.observacionesParams, project);
  const pv = Engine.personalSobreVentas(project);
  const val = Engine.validacionRiesgos(project, catRiesgos);

  const NIVELES = ['descarta', 'negocia', 'adelante'];
  const START = { rojo: 'descarta', ambar: 'negocia', verde: 'adelante' };
  let idx = NIVELES.indexOf(START[a.verdict.color] || 'descarta');

  const rebajas = [], avisos = [], dimensiones = [];

  // 💰 Dinero
  dimensiones.push({ clave: 'dinero', etiqueta: 'Dinero', estado: a.verdict.color, texto: a.verdict.titulo + '.' });

  // 📍 Zona
  if (zona.nivel === 'sin_datos') {
    dimensiones.push({ clave: 'zona', etiqueta: 'Zona', estado: 'neutro', texto: 'Sin datos — valora la ubicación en la pestaña Zona.' });
  } else if (zona.nivel === 'fuerte') {
    dimensiones.push({ clave: 'zona', etiqueta: 'Zona', estado: 'verde', texto: 'Zona fuerte (media ' + zona.media.toFixed(1) + ').' });
  } else if (zona.nivel === 'media') {
    dimensiones.push({ clave: 'zona', etiqueta: 'Zona', estado: 'ambar', texto: 'Zona media (media ' + zona.media.toFixed(1) + ').' });
    avisos.push('La zona es mejorable (media ' + zona.media.toFixed(1) + '): revisa qué la debilita en su pestaña.');
  } else {
    dimensiones.push({ clave: 'zona', etiqueta: 'Zona', estado: 'rojo', texto: 'Zona peligrosa (media ' + zona.media.toFixed(1) + ').' });
    rebajas.push('Zona peligrosa (media ' + zona.media.toFixed(1) + '): la ubicación puede hundir la previsión.');
    idx--;
  }

  // 👀 Observado
  if (obs.fiabilidad === 'sin_datos') {
    dimensiones.push({ clave: 'observado', etiqueta: 'Observado', estado: 'neutro', texto: 'Sin datos — apunta visitas reales en la pestaña Campo.' });
  } else {
    const muyAbajo = obs.desviacionPct != null && obs.desviacionPct <= -0.20;
    const desvTxt = obs.desviacionPct != null
      ? ((obs.desviacionPct >= 0 ? '+' : '') + Math.round(obs.desviacionPct * 100) + ' %') : null;
    if (obs.fiabilidad === 'baja') {
      dimensiones.push({ clave: 'observado', etiqueta: 'Observado', estado: 'ambar',
        texto: obs.n + ' visita(s), fiabilidad baja' + (desvTxt ? ' (' + desvTxt + ' vs tu previsión)' : '') + '.' });
      avisos.push(muyAbajo
        ? 'Lo observado apunta muy por debajo de tu previsión (' + desvTxt + '), pero con pocas visitas: visita más antes de fiarte.'
        : 'Pocas visitas o poco variadas: la estimación de campo es orientativa.');
    } else if (muyAbajo) {
      dimensiones.push({ clave: 'observado', etiqueta: 'Observado', estado: 'rojo',
        texto: 'Lo observado va ' + desvTxt + ' vs tu previsión (fiabilidad ' + obs.fiabilidad + ').' });
      rebajas.push('Lo observado sobre el terreno (' + desvTxt + ') no sostiene tu previsión, que es la base del veredicto financiero.');
      idx--;
    } else {
      dimensiones.push({ clave: 'observado', etiqueta: 'Observado', estado: 'verde',
        texto: 'Lo observado encaja con tu previsión' + (desvTxt ? ' (' + desvTxt + ')' : '') + '.' });
    }
  }

  // 👥 Personal
  let ratioMax = Math.max(Number(pv.verano) || 0, Number(pv.invierno) || 0);
  // Si personalSobreVentas devuelve 0 (sin mesBueno ni mesMalo), usa mesNormal como fallback
  if (ratioMax <= 0) {
    const costeMes = Engine.costePersonalMensual(project);
    const mesNormal = Number((project.facturacion || {}).mesNormal) || 0;
    if (costeMes > 0 && mesNormal > 0) {
      ratioMax = costeMes / mesNormal * 100;
    }
  }
  if (ratioMax <= 0) {
    dimensiones.push({ clave: 'personal', etiqueta: 'Personal', estado: 'neutro', texto: 'Sin datos de personal o facturación.' });
  } else if (ratioMax > topePersonal) {
    dimensiones.push({ clave: 'personal', etiqueta: 'Personal', estado: 'ambar',
      texto: 'El personal llega al ' + ratioMax.toFixed(0) + ' % de las ventas (tope orientativo ' + topePersonal + ' %).' });
    avisos.push('El personal se come el ' + ratioMax.toFixed(0) + ' % de las ventas en el peor tramo (tope orientativo del sector: ' + topePersonal + ' %).');
  } else {
    dimensiones.push({ clave: 'personal', etiqueta: 'Personal', estado: 'verde',
      texto: 'Personal dentro del tope del sector (' + ratioMax.toFixed(0) + ' % ≤ ' + topePersonal + ' %).' });
  }

  // ✅ Validación
  if (val.total === 0 || val.hechos === 0) {
    dimensiones.push({ clave: 'validacion', etiqueta: 'Validación', estado: 'neutro', texto: 'Checklist sin empezar — valida lo importante en la pestaña Riesgos.' });
  } else if (val.pct >= 80) {
    dimensiones.push({ clave: 'validacion', etiqueta: 'Validación', estado: 'verde', texto: val.hechos + '/' + val.total + ' validados. Listo.' });
  } else {
    dimensiones.push({ clave: 'validacion', etiqueta: 'Validación', estado: 'ambar', texto: val.hechos + '/' + val.total + ' validados.' });
    avisos.push('Termina de validar el checklist antes de abrir (' + val.hechos + '/' + val.total + ').');
  }

  idx = Math.max(0, idx);
  const nivel = NIVELES[idx];
  const TITULOS = { adelante: 'Adelante', negocia: 'Negocia o revisa', descarta: 'Descártalo' };
  const COLORES = { adelante: 'verde', negocia: 'ambar', descarta: 'rojo' };
  return { nivel, titulo: TITULOS[nivel], color: COLORES[nivel], rebajas, avisos, dimensiones };
};

// Clon profundo para simulaciones (los proyectos son JSON puro).
Engine.clonProyecto = function (project) { return JSON.parse(JSON.stringify(project)); };

// Criterio de viabilidad: la negación del rojo del veredicto de dinero.
Engine.esViable = function (a) {
  return a.realista.beneficioNeto > 0
    && isFinite(a.breakeven.breakevenAnual)
    && a.breakeven.margenSeguridadPct >= 0;
};

// Índice de riesgo 0–100 a partir de señales ya calculadas por el motor.
// opts.zona = resultado de Engine.veredictoZona; opts.validacion = de Engine.validacionRiesgos.
// Componente sin datos → mitad de su peso (prudente: la incertidumbre no puntúa 0).
Engine.indiceRiesgo = function (project, a, opts) {
  const o = opts || {};
  const componentes = [];
  const add = (clave, etiqueta, puntos, max, texto) => {
    const p = Math.max(0, Math.min(max, puntos));
    componentes.push({ clave, etiqueta, puntos: Math.round(p * 10) / 10, max, texto });
  };
  const eur = n => Math.round(n).toLocaleString('es-ES');

  // Margen de seguridad (30): holgado a partir del 25 %.
  const ms = a.breakeven.margenSeguridadPct;
  if (!isFinite(ms)) add('margen_seguridad', 'Margen de seguridad', 30, 30, 'Sin punto de equilibrio alcanzable.');
  else if (ms < 0) add('margen_seguridad', 'Margen de seguridad', 30, 30, 'Negativo: facturas por debajo del equilibrio.');
  else add('margen_seguridad', 'Margen de seguridad', 30 * Math.max(0, 1 - ms / 25), 30, ms.toFixed(0) + ' % (holgado a partir del 25 %).');

  // Escenario pesimista (25): peso completo si la pérdida llega al 15 % de sus ventas.
  const pes = a.pesimista;
  if (pes.beneficioNeto >= 0) add('pesimista', 'Escenario pesimista', 0, 25, 'Aguantas un mal año sin pérdidas.');
  else {
    const ratio = pes.facturacion > 0 ? Math.min(1, -pes.beneficioNeto / (pes.facturacion * 0.15)) : 1;
    add('pesimista', 'Escenario pesimista', 25 * ratio, 25, 'En un mal año pierdes ' + eur(-pes.beneficioNeto) + ' €.');
  }

  // Colchón de caja (15): solo el bache OPERATIVO del año (la inversión inicial
  // no es un "mes malo"); peso completo si necesitas ≥ 3 meses de costes fijos.
  const fijosMes = a.realista.costesFijosAnuales / 12;
  let runCaja = 0, minCaja = 0;
  (a.cashflow.cajaMes || []).forEach(c => { runCaja += c; if (runCaja < minCaja) minCaja = runCaja; });
  const colchon = Math.max(0, -minCaja);
  if (colchon <= 0) add('colchon', 'Colchón de caja', 0, 15, 'La caja operativa no llega a estar en negativo.');
  else add('colchon', 'Colchón de caja', fijosMes > 0 ? 15 * Math.min(1, colchon / (3 * fijosMes)) : 15, 15,
    'Necesitas ~' + eur(colchon) + ' € para aguantar los meses malos.');

  // Validación de riesgos (15).
  const val = o.validacion;
  if (!val || !val.total) add('validacion', 'Validación de riesgos', 7.5, 15, 'Checklist sin empezar.');
  else add('validacion', 'Validación de riesgos', 15 * (1 - (val.pct || 0) / 100), 15, val.hechos + '/' + val.total + ' comprobados.');

  // Zona (15).
  const zona = o.zona;
  if (!zona || zona.nivel === 'sin_datos') add('zona', 'Zona', 7.5, 15, 'Sin valorar.');
  else if (zona.nivel === 'fuerte') add('zona', 'Zona', 0, 15, 'Zona fuerte (media ' + zona.media.toFixed(1) + ').');
  else if (zona.nivel === 'media') add('zona', 'Zona', 7.5, 15, 'Zona media (media ' + zona.media.toFixed(1) + ').');
  else add('zona', 'Zona', 15, 15, 'Zona peligrosa (media ' + zona.media.toFixed(1) + ').');

  const valor = Math.max(0, Math.min(100, Math.round(componentes.reduce((s, c) => s + c.puntos, 0))));
  const banda = valor <= 33 ? 'baja' : (valor <= 66 ? 'media' : 'alta');
  return { valor, banda, componentes };
};

// ¿Qué tendría que cambiar para que el negocio sea viable?
// Palancas de mejora PLAUSIBLES (topes de prudencia fijos o ligados al benchmark
// del sector); greedy por impacto, cada palanca al paso más pequeño que baste,
// recalculando SIEMPRE con Engine.analyze sobre un clon. Tres modos:
// ya viable (mejora, top 3) / alcanza viabilidad (combinación mínima) / no llega.
Engine.planViabilidad = function (project, opts) {
  const o = opts || {};
  const b = o.benchmarks || { costeMercanciaPct:[20,40], mermaPct:[0,5], alquilerSobreVentasPct:[5,12], paybackAnios:[2,5], personalSobreVentasPct:[0,35] };
  const antes = Engine.analyze(project);
  const netoMes0 = antes.realista.beneficioNeto / 12;
  const base = antes.base;
  const eur = n => Math.round(n).toLocaleString('es-ES');

  const escalaFacturacion = (p, factor) => {
    const f = p.facturacion || {};
    f.mesBueno = (Number(f.mesBueno) || 0) * factor;
    f.mesNormal = (Number(f.mesNormal) || 0) * factor;
    f.mesMalo = (Number(f.mesMalo) || 0) * factor;
  };

  const palancas = [];
  if (base > 0) {
    palancas.push({ clave:'ticket', titulo:'Subir el ticket medio', pasos:[2, 5],
      aplicar: (c, x) => { escalaFacturacion(c, 1 + x / 100);
        if (c.operativa) c.operativa.ticketMedio = (Number(c.operativa.ticketMedio) || 0) * (1 + x / 100); },
      descripcion: (x) => {
        const t = Number((project.operativa || {}).ticketMedio) || 0;
        const extra = t > 0 ? ' (+' + (t * x / 100).toFixed(2).replace('.', ',') + ' € por cliente)' : '';
        return 'Sube el ticket medio un ' + x + ' %' + extra + '.';
      } });
    palancas.push({ clave:'clientes', titulo:'Atraer más clientes', pasos:[5, 10],
      aplicar: (c, x) => escalaFacturacion(c, 1 + x / 100),
      descripcion: (x) => 'Consigue un ' + x + ' % más de clientes manteniendo el ticket.' });
  }
  const cmActual = Engine.costeMercanciaPct(project.margen);
  const topeCM = (b.costeMercanciaPct && b.costeMercanciaPct[1] != null) ? b.costeMercanciaPct[1] : null;
  if (topeCM != null && cmActual > topeCM) {
    palancas.push({ clave:'mercancia', titulo:'Bajar el coste de mercancía', pasos:[topeCM],
      aplicar: (c, x) => { c.margen = { modo:'global', costeMercanciaPct:x, productos:[], categorias:[] }; },
      descripcion: (x) => 'Baja el coste de mercancía del ' + cmActual.toFixed(0) + ' % al ' + x + ' % (tope orientativo del sector): renegocia proveedores o revisa escandallos.' });
  }
  const personalAnual = Engine.costePersonalAnual(project);
  const topePersonal = (b.personalSobreVentasPct && b.personalSobreVentasPct[1] != null) ? b.personalSobreVentasPct[1] : 35;
  if (personalAnual > 0 && base > 0 && personalAnual / base * 100 > topePersonal) {
    palancas.push({ clave:'personal', titulo:'Reducir el coste de personal', pasos:[5],
      aplicar: (c, x) => { const f = 1 - x / 100;
        (c.empleados || []).forEach(e => { e.sueldoBrutoMes = (Number(e.sueldoBrutoMes) || 0) * f; });
        (c.refuerzos || []).forEach(r => { r.eurHora = (Number(r.eurHora) || 0) * f; }); },
      descripcion: (x) => 'Reduce el coste de personal un ' + x + ' % ajustando horas o plantilla (hoy supera el tope orientativo del sector, ' + topePersonal + ' % de las ventas).' });
  }
  const alquiler = (project.costesFijos || []).find(c => /alquiler/i.test(c.concepto || ''));
  const maxAlqMes = (base > 0 && b.alquilerSobreVentasPct && b.alquilerSobreVentasPct[1] != null)
    ? b.alquilerSobreVentasPct[1] / 100 * base / 12 : null;
  if (alquiler && maxAlqMes != null && (Number(alquiler.importe) || 0) > maxAlqMes) {
    palancas.push({ clave:'alquiler', titulo:'Renegociar el alquiler', pasos:[Math.round(maxAlqMes)],
      aplicar: (c, x) => { const a2 = (c.costesFijos || []).find(cc => /alquiler/i.test(cc.concepto || '')); if (a2) a2.importe = x; },
      descripcion: (x) => 'Renegocia el alquiler de ' + eur(alquiler.importe) + ' € a ' + eur(x) + ' €/mes (máximo recomendado para tus ventas).' });
  }

  // Impacto individual de cada palanca a su tope, sobre el proyecto original.
  const netoMesDe = (p) => Engine.analyze(p).realista.beneficioNeto / 12;
  palancas.forEach(pl => {
    const clon = Engine.clonProyecto(project);
    pl.aplicar(clon, pl.pasos[pl.pasos.length - 1]);
    pl.impactoMax = netoMesDe(clon) - netoMes0;
  });
  palancas.sort((p1, p2) => p2.impactoMax - p1.impactoMax);

  const viableYa = Engine.esViable(antes);
  const pasosOut = [];
  const acum = Engine.clonProyecto(project);
  let netoAcum = netoMes0;
  const aplicarYRegistrar = (pl, x) => {
    pl.aplicar(acum, x);
    const neto = netoMesDe(acum);
    pasosOut.push({ clave: pl.clave, titulo: pl.titulo, descripcion: pl.descripcion(x), impactoMes: neto - netoAcum });
    netoAcum = neto;
  };

  if (viableYa) {
    palancas.filter(pl => pl.impactoMax > 0).slice(0, 3)
      .forEach(pl => aplicarYRegistrar(pl, pl.pasos[pl.pasos.length - 1]));
  } else {
    for (const pl of palancas) {
      if (pl.impactoMax <= 0) continue;
      let elegido = pl.pasos[pl.pasos.length - 1];
      for (const x of pl.pasos) {  // el paso más pequeño que baste
        const prueba = Engine.clonProyecto(acum);
        pl.aplicar(prueba, x);
        if (Engine.esViable(Engine.analyze(prueba))) { elegido = x; break; }
      }
      aplicarYRegistrar(pl, elegido);
      if (Engine.esViable(Engine.analyze(acum))) break;
    }
  }

  const despuesA = Engine.analyze(acum);
  const alcanzaViabilidad = Engine.esViable(despuesA);
  const antesOut = { netoMes: netoMes0, netoAnual: antes.realista.beneficioNeto };
  const despuesOut = { netoMes: despuesA.realista.beneficioNeto / 12, netoAnual: despuesA.realista.beneficioNeto };

  let resumen;
  const lista = pasosOut.map(p2 => p2.descripcion.replace(/\.$/, '')).join('; ');
  if (viableYa) {
    resumen = pasosOut.length
      ? 'El negocio ya es viable. Aun así hay margen: ' + lista + '. Pasarías de ' + eur(antesOut.netoMes) + ' a ~' + eur(despuesOut.netoMes) + ' € netos al mes.'
      : 'El negocio ya es viable y no vemos palancas de mejora claras dentro de rangos prudentes.';
  } else if (alcanzaViabilidad) {
    resumen = 'Si haces esto — ' + lista + ' — el negocio pasaría de ' + eur(antesOut.netoMes) + ' a ~' + eur(despuesOut.netoMes) + ' € netos al mes y sería viable.';
  } else {
    resumen = 'Ni aplicando todas las mejoras plausibles dentro de los rangos del sector (' + (lista || 'ninguna palanca disponible') + ') el negocio sale viable: replantea el modelo — precio, local o formato.';
  }

  return { viableYa, alcanzaViabilidad, antes: antesOut, despues: despuesOut, pasos: pasosOut, resumen };
};

if (typeof module !== 'undefined' && module.exports) module.exports = Engine;
if (typeof window !== 'undefined') window.Engine = Engine;

  Templates.crearDesdePlantilla = function (sectorId) {
    const base = Engine.proyectoVacio();
    const def = SECTOR_DEFS[sectorId];
    if (!def) { base.sector = 'generico'; base.nombre = 'Nuevo proyecto'; return base; }
    base.sector = sectorId;
    base.nombre = def.nombre;
    base.mermaPct = def.mermaPct;
    base.ivaPct = def.ivaPct;
    base.impuestoPct = def.impuestoPct;
    base.margen = def.margenCategorias
      ? { modo:'categorias', costeMercanciaPct: def.costeMercanciaPct, productos: [],
          categorias: def.margenCategorias.map(c => Object.assign({}, c)) }
      : { modo:'global', costeMercanciaPct: def.costeMercanciaPct, productos: [], categorias: [] };
    base.operativa = Object.assign({}, base.operativa, { ticketMedio: def.ticketMedio, diasAbiertosSemana: def.diasAbiertosSemana, unidadCliente: def.unidadCliente });
    base.costesFijos = def.costesFijos.map(c => ({ concepto: c.concepto, importe: 0, tipo: c.tipo }));
    return base;
  };

  <script>
'use strict';
(function () {
  const Engine = (typeof require !== 'undefined') ? require('./engine.js')
    : (typeof window !== 'undefined' ? window.Engine : null);

  const Storage = {};
  const CLAVE = 'simuladorx';

  Storage.serializar = function (estado) { return JSON.stringify(estado); };
  Storage.deserializar = function (str) { return JSON.parse(str); };

  function mergeProfundo(base, parcial) {
    const out = Array.isArray(base) ? base.slice() : Object.assign({}, base);
    if (!parcial || typeof parcial !== 'object') return out;
    for (const k of Object.keys(parcial)) {
      const bv = base ? base[k] : undefined, pv = parcial[k];
      if (pv && typeof pv === 'object' && !Array.isArray(pv) && bv && typeof bv === 'object' && !Array.isArray(bv)) {
        out[k] = mergeProfundo(bv, pv);
      } else if (pv !== undefined) {
        out[k] = pv;
      }
    }
    return out;
  }

  // Deja project.calendario en exactamente 12 entradas válidas ('B'/'N'/'M')
  // y re-deriva los conteos para que cuadren (el calendario es la verdad).
  function normalizarCalendario(project) {
    const VALIDO = { B:1, N:1, M:1 };
    let cal = (Array.isArray(project.calendario) ? project.calendario : []).slice(0, 12)
      .map(x => VALIDO[x] ? x : 'N');
    while (cal.length < 12) cal.push('N');
    project.calendario = cal;
    project.facturacion = project.facturacion || {};
    project.facturacion.nBuenos   = cal.filter(x => x === 'B').length;
    project.facturacion.nNormales = cal.filter(x => x === 'N').length;
    project.facturacion.nMalos    = cal.filter(x => x === 'M').length;
  }

  Storage.migrar = function (estado) {
    if (!estado || typeof estado !== 'object') return { version:1, proyectos:[], activoId:null, plantillas:[], ordenLista:'manual' };
    const proyectos = (estado.proyectos || []).map(p => {
      const completo = mergeProfundo(Engine.proyectoVacio(), p);
      completo.id = p.id;
      normalizarCalendario(completo);
      return completo;
    });
    return { version:1, proyectos, activoId: (proyectos.some(p => p.id === estado.activoId) ? estado.activoId : (proyectos[0] && proyectos[0].id)) || null, plantillas: Array.isArray(estado.plantillas) ? estado.plantillas : [], ordenLista: estado.ordenLista === 'beneficio' ? 'beneficio' : 'manual' };
  };

  Storage.nuevoId = function () {
    return 'p_' + Math.random().toString(36).slice(2, 10) + Date.now().toString(36);
  };

  Storage.cargar = function () {
    try { return Storage.migrar(Storage.deserializar(window.localStorage.getItem(CLAVE))); }
    catch (e) { return Storage.migrar(null); }
  };

  Storage.guardar = function (estado) {
    try { window.localStorage.setItem(CLAVE, Storage.serializar(estado)); return true; }
    catch (e) { return false; }
  };

  if (typeof module !== 'undefined' && module.exports) module.exports = Storage;
  if (typeof window !== 'undefined') window.Storage = Storage;
})();

  <script>
'use strict';
const UI = {};
UI.el = function (tag, props, hijos) {
  const n = document.createElement(tag);
  if (props) for (const k of Object.keys(props)) {
    if (k === 'class') n.className = props[k];
    else if (k === 'html') n.innerHTML = props[k];
    else if (k.startsWith('on') && typeof props[k] === 'function') n.addEventListener(k.slice(2), props[k]);
    else if (k === 'value') n.value = props[k];
    else n.setAttribute(k, props[k]);
  }
  (Array.isArray(hijos) ? hijos : (hijos != null ? [hijos] : [])).forEach(h => {
    if (h == null) return;
    n.appendChild(typeof h === 'string' ? document.createTextNode(h) : h);
  });
  return n;
};
UI.eur = n => (Math.round(n)||0).toLocaleString('es-ES') + ' €';
UI.pct = n => (n||0).toFixed(1) + ' %';
// helper: input numérico/texto que escribe en project[path] y refresca dashboard
UI.campo = function (project, etiqueta, obj, clave, tipo, ayudaKey, ejemplo, recalc) {
  const esTexto = tipo === 'text';
  // Numéricos como type=text: type=number rechaza la coma decimal española antes
  // de llegar a JS (sobre todo en iPhone), dejando el campo solo-enteros en la práctica.
  const input = UI.el('input', { type: 'text',
    ...(esTexto ? {} : { inputmode:'decimal' }),
    value: obj[clave] != null ? (esTexto ? obj[clave] : String(obj[clave]).replace('.', ',')) : '',
    oninput: (e) => {
      obj[clave] = esTexto ? e.target.value : Engine.parseNum(e.target.value);
      App.guardarDebounced();
      if (recalc) App.refrescarTab();
    }});
  if (ejemplo) input.setAttribute('placeholder', ejemplo);
  const hijos = [UI.el('label', null, etiqueta), input];
  if (ayudaKey && Templates.ayudaCampos()[ayudaKey]) hijos.push(UI.el('div',{class:'microayuda'}, Templates.ayudaCampos()[ayudaKey]));
  return UI.el('div', { class:'field' }, hijos);
};

  const ciclo = { B:'N', N:'M', M:'B' };

    const c = project.calendario;
    project.facturacion.nBuenos = c.filter(x=>x==='B').length;
    project.facturacion.nNormales = c.filter(x=>x==='N').length;
    project.facturacion.nMalos = c.filter(x=>x==='M').length;

  project.calendario.forEach((t,i)=>{
    const b = UI.el('button',{class:'cal-mes cal-'+t, onclick:()=>{
      project.calendario[i] = ciclo[project.calendario[i]];
      sincronizarConteos(); App.guardarDebounced();
      App.refrescarTab();

UI.escenarioSel = 'base';   // 'pesimista' | 'base' | 'optimista' (persiste entre repintados)
UI.ESCENARIOS = [['pesimista','Pesimista'],['base','Base'],['optimista','Optimista']];

UI.multiplicadorEscenario = function (project, sel) {
  const esc = project.escenarios || {};
  if (sel === 'optimista') return 1 + (Number(esc.optimistaPct) || 0) / 100;
  if (sel === 'pesimista') return 1 - (Number(esc.pesimistaPct) || 0) / 100;
  return 1;
};

UI.barrasTemporada = function (temp) {
  const filas = [['fuertes','Fuertes'],['medios','Medios'],['flojos','Flojos']];
  const maxAbs = Math.max(1, ...filas.map(([k]) => Math.abs(temp[k].benefMes)));
  const card = UI.el('div',{class:'card'},[UI.el('h2',null,'Beneficio por temporada (€/mes)')]);
  filas.forEach(([k,lab]) => {
    const v = temp[k].benefMes;
    const neg = v < 0;
    const w = Math.abs(v) / maxAbs * 100;
    card.appendChild(UI.el('div',{class:'barra-temp'},[
      UI.el('div',{class:'barra-temp__lab'}, lab),
      UI.el('div',{class:'barra-temp__track'},[ UI.el('div',{class:'barra-temp__fill'+(neg?' neg':''),style:'width:'+w+'%'}) ]),
      UI.el('div',{class:'barra-temp__val'+(neg?' neg':'')}, UI.eur(v)+'/mes')
    ]));
  });
  return card;
};

UI.aroPct = function (pct) {
  const p = Math.min(100, Math.max(0, Number(pct) || 0));
  const r = 34, c = 2 * Math.PI * r, off = c * (1 - p / 100);
  const ns = 'http://www.w3.org/2000/svg';
  const svg = document.createElementNS(ns,'svg');
  svg.setAttribute('viewBox','0 0 80 80'); svg.setAttribute('width','80'); svg.setAttribute('height','80');
  const mk = (extra) => { const el = document.createElementNS(ns,'circle');
    el.setAttribute('cx',40); el.setAttribute('cy',40); el.setAttribute('r',r);
    el.setAttribute('fill','none'); el.setAttribute('stroke-width','8');
    for (const k of Object.keys(extra)) el.setAttribute(k, extra[k]); return el; };
  svg.appendChild(mk({ stroke:'#262932' }));
  svg.appendChild(mk({ stroke:'#4a90d9', 'stroke-dasharray':c, 'stroke-dashoffset':off,
    'stroke-linecap':'round', transform:'rotate(-90 40 40)' }));
  const t = document.createElementNS(ns,'text');
  t.setAttribute('x',40); t.setAttribute('y',46); t.setAttribute('text-anchor','middle');
  t.setAttribute('font-size','18'); t.setAttribute('font-weight','600'); t.setAttribute('fill','#e8e9ec');
  t.textContent = Math.round(p) + '%';
  svg.appendChild(t);
  return svg;
};

UI.barraApilada = function (s) {
  const personal = Math.max(0, Number(s.costePersonalAnual)||0);
  const fijosSinPersonal = Math.max(0, (s.costesFijosAnuales||0) - personal);
  const partes = [
    { etq:'Mercancía', val:s.costeMercancia, color:'#3a3d44' },
    { etq:'Merma', val:s.merma, color:'#494d56' },
    { etq:'Personal', val:personal, color:'#585c66' },
    { etq:'Fijos', val:fijosSinPersonal, color:'#686d78' },
    { etq:'Impuestos', val:s.impuestos, color:'#787d8a' },
    { etq:'Beneficio', val:Math.max(0,s.beneficioNeto), color:'#4a90d9' }
  ];
  const total = partes.reduce((t,p)=>t+p.val,0) || 1;
  const W=520,H=46; let x=0;
  const svg = document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.setAttribute('viewBox',`0 0 ${W} ${H}`); svg.setAttribute('width','100%');
  partes.forEach(p=>{
    const w = p.val/total*W;
    const r = document.createElementNS('http://www.w3.org/2000/svg','rect');
    r.setAttribute('x',x);r.setAttribute('y',0);r.setAttribute('width',Math.max(0,w));r.setAttribute('height',24);
    r.setAttribute('fill',p.color);
    const t = document.createElementNS('http://www.w3.org/2000/svg','text');
    t.setAttribute('x',x);t.setAttribute('y',40);t.setAttribute('font-size','10');t.setAttribute('fill','#868a93');
    t.textContent = p.etq+' '+Math.round(p.val/total*100)+'%';
    svg.appendChild(r); if (w>40) svg.appendChild(t); x+=w;
  });
  return svg;
};

UI.graficoLinea = function (serie) {
  const W=520,H=160,pad=24;
  const min=Math.min(0,...serie), max=Math.max(0,...serie), rango=(max-min)||1;
  const x = i => pad + i*(W-2*pad)/(serie.length-1);
  const y = v => H-pad - (v-min)/rango*(H-2*pad);
  const svgns='http://www.w3.org/2000/svg';
  const svg=document.createElementNS(svgns,'svg'); svg.setAttribute('viewBox',`0 0 ${W} ${H}`); svg.setAttribute('width','100%');
  // eje cero
  const zero=document.createElementNS(svgns,'line');
  zero.setAttribute('x1',pad);zero.setAttribute('x2',W-pad);zero.setAttribute('y1',y(0));zero.setAttribute('y2',y(0));
  zero.setAttribute('stroke','#d2d2d7');zero.setAttribute('stroke-dasharray','4 4'); svg.appendChild(zero);
  // línea
  const path=document.createElementNS(svgns,'polyline');
  path.setAttribute('fill','none');path.setAttribute('stroke','var(--accent)');path.setAttribute('stroke-width','2');
  path.setAttribute('points',serie.map((v,i)=>x(i)+','+y(v)).join(' ')); svg.appendChild(path);
  return svg;
};

UI.renderSensibilidad = function (project, cont) {
  const card = UI.el('div',{class:'card'},[UI.el('h2',null,['¿Y si…? (mueve y mira)', UI.tooltip('Simula cambios sin tocar tus datos.')])]);
  const estado = { fact:100, fijos:100, merc:100 };
  const salida = UI.el('div',{class:'kpi'});
  const peligro = UI.el('div',{class:'muted'});
  const recalc = () => {
    const copia = JSON.parse(JSON.stringify(project));
    const f = copia.facturacion;
    ['mesBueno','mesNormal','mesMalo'].forEach(k=> f[k] = f[k]*estado.fact/100);
    copia.costesFijos = copia.costesFijos.map(c=>({...c, importe:c.importe*estado.fijos/100}));
    if (copia.propietario) copia.propietario.sueldoMes = copia.propietario.sueldoMes; // el sueldo no escala con "fijos" salvo que se quiera
    if (copia.margen.modo==='global') copia.margen.costeMercanciaPct = copia.margen.costeMercanciaPct*estado.merc/100;
    else if (copia.margen.modo==='categorias') (copia.margen.categorias||[]).forEach(c=>{ c.costeMercanciaPct = c.costeMercanciaPct*estado.merc/100; });
    const r = Engine.computeScenario(copia, 1);
    salida.textContent = 'Beneficio realista: ' + UI.eur(r.beneficioNeto) + '/año';
    salida.className = 'kpi' + (r.beneficioNeto<0?' kpi--neg':'');
    // Variable más peligrosa: impacto adverso de −10 puntos en cada variable
    const base = r.beneficioNeto;
    const varFact = (()=>{ const c2=JSON.parse(JSON.stringify(copia)); ['mesBueno','mesNormal','mesMalo'].forEach(k=>c2.facturacion[k]=c2.facturacion[k]*(100-10)/100); return Engine.computeScenario(c2,1).beneficioNeto; })();
    const varFijos = (()=>{ const c2=JSON.parse(JSON.stringify(copia)); c2.costesFijos=c2.costesFijos.map(cc=>({...cc,importe:cc.importe*(100+10)/100})); return Engine.computeScenario(c2,1).beneficioNeto; })();
    const varMerc = (()=>{ const c2=JSON.parse(JSON.stringify(copia)); if(c2.margen.modo==='global') c2.margen.costeMercanciaPct=c2.margen.costeMercanciaPct*(100+10)/100; else if(c2.margen.modo==='categorias') (c2.margen.categorias||[]).forEach(c=>{ c.costeMercanciaPct=c.costeMercanciaPct*(100+10)/100; }); return Engine.computeScenario(c2,1).beneficioNeto; })();
    const impactos = [
      { nombre:'Facturación', delta: base - varFact },
      { nombre:'Costes fijos', delta: base - varFijos },
      { nombre:'Coste de mercancía', delta: base - varMerc }
    ];
    const masPeligrosa = impactos.reduce((a,b) => b.delta > a.delta ? b : a);
    peligro.textContent = 'La variable más peligrosa: ' + masPeligrosa.nombre;
  };
  const fmtDelta = v => { const d = v - 100; return d === 0 ? '±0 %' : (d > 0 ? '+' : '−') + Math.abs(d) + ' %'; };
  const slider = (etq, clave) => {
    const val = UI.el('span',{class:'muted'}, fmtDelta(estado[clave]));
    const inp = UI.el('input',{type:'range',min:50,max:150,value:estado[clave],oninput:(e)=>{estado[clave]=parseInt(e.target.value,10);val.textContent=fmtDelta(estado[clave]);recalc();}});
    return UI.el('div',{class:'field'},[UI.el('label',null,[etq+' ', val]), inp]);
  };
  card.appendChild(UI.el('div',{class:'microayuda'},'±0 % = tu situación actual. Mueve cada barra para ver el efecto.'));
  card.appendChild(slider('Facturación','fact'));
  card.appendChild(slider('Costes fijos','fijos'));
  card.appendChild(slider('Coste de mercancía','merc'));
  card.appendChild(salida);
  card.appendChild(peligro);
  recalc();
  cont.appendChild(card);
};

UI.renderComparador = function () {
  const cont = document.getElementById('panel-tab'); cont.innerHTML = '';
  if (!Array.isArray(UI.comparadorSeleccion)) UI.comparadorSeleccion = App.state.proyectos.map(p=>p.id);
  const sel = UI.comparadorSeleccion;

  // Selector: qué proyectos entran en la comparación
  const selector = UI.el('div',{class:'comp-selector'}, App.state.proyectos.map(p => {
    const incluido = sel.includes(p.id);
    const chk = UI.el('input',{type:'checkbox', ...(incluido?{checked:'checked'}:{}), onchange:(e)=>{
      const s = UI.comparadorSeleccion.slice();
      if (e.target.checked) { if (!s.includes(p.id)) s.push(p.id); }
      else { const i = s.indexOf(p.id); if (i>=0) s.splice(i,1); }
      UI.comparadorSeleccion = s; App.render();
    }});
    return UI.el('label',{class:'comp-selector__item'},[chk, UI.el('span',null,p.nombre || 'Sin nombre')]);
  }));

  const incluidos = App.state.proyectos.filter(p => sel.includes(p.id));
  const filas = incluidos.map(p => {
    const a = Engine.analyze(p);
    return { nombre:p.nombre, beneficio:a.realista.beneficioNeto, margen:a.realista.margenNetoPct,
      payback: a.inversion && isFinite(a.inversion.paybackAnios) ? a.inversion.paybackAnios : Infinity,
      colchon: a.cashflow.colchonNecesario, veredicto:a.verdict.color };
  });
  const mejor = (clave, masAltoMejor) => {
    let idx=-1, best = masAltoMejor?-Infinity:Infinity;
    filas.forEach((f,i)=>{ const v=f[clave]; if (masAltoMejor? v>best : v<best){best=v;idx=i;} });
    return idx;
  };
  const mejorBenef = mejor('beneficio',true), mejorPayback = mejor('payback',false), mejorColchon = mejor('colchon',false);
  const th = t => UI.el('th',null,t);
  const cuerpo = (filas.length < 2)
    ? UI.el('div',{class:'muted',style:'margin-top:12px'},'Elige al menos 2 proyectos para comparar.')
    : UI.el('table',{class:'tabla-comp'},[
        UI.el('thead',null,UI.el('tr',null,[th('Proyecto'),th('Beneficio/año'),th('Margen neto'),th('Payback'),th('Colchón'),th('Veredicto')])),
        UI.el('tbody',null,filas.map((f,i)=>UI.el('tr',null,[
          UI.el('td',null,f.nombre),
          UI.el('td',{class:i===mejorBenef?'mejor':''},UI.eur(f.beneficio)),
          UI.el('td',null,UI.pct(f.margen)),
          UI.el('td',{class:i===mejorPayback&&isFinite(f.payback)?'mejor':''}, isFinite(f.payback)?f.payback.toFixed(1)+' años':'—'),
          UI.el('td',{class:i===mejorColchon?'mejor':''},UI.eur(f.colchon)),
          UI.el('td',null,UI.el('span',{class:'punto punto--'+f.veredicto}))
        ])))
      ]);

  cont.appendChild(UI.el('div',{class:'card'},[
    UI.el('h2',null,'Comparador de proyectos'),
    UI.el('button',{class:'btn',onclick:App.verLista},'← Volver'),
    selector,
    cuerpo
  ]));
};

UI.renderZona = function (project, cont) {
  cont = cont || document.getElementById('panel-tab'); cont.innerHTML = '';
  if (!project.zona || typeof project.zona !== 'object') project.zona = { factores:{} };
  if (!project.zona.factores) project.zona.factores = {};
  const catalogo = Templates.ZONA();
  const v = Engine.veredictoZona(project.zona, catalogo);
  const TITULOS = { fuerte:'Zona fuerte', media:'Zona media', peligrosa:'Zona peligrosa', sin_datos:'Aún sin valorar' };

  // Tarjeta de veredicto
  const sub = v.nValorados + ' / ' + v.nTotal + ' valorados' + (v.media != null ? ' · media ' + v.media.toFixed(1) : '');
  const cab = UI.el('div',{class:'card'},[
    UI.el('div',{class:'semaforo semaforo--'+v.color},[
      UI.el('div',null,[ UI.el('div',{class:'kpi'}, TITULOS[v.nivel]), UI.el('div',{class:'muted'}, sub) ])
    ])
  ]);
  if (v.debilidades.length) {
    cab.appendChild(UI.el('div',{class:'microayuda'},
      'Lo que más debilita la zona: ' + v.debilidades.map(d => d.etiqueta + ' (' + d.nota + ')').join(' · ')));
  }
  cont.appendChild(cab);

  // Fila por factor: deslizador 1-10 + "no aplica", estado "sin valorar" por defecto
  const filaFactor = (f) => {
    const val = project.zona.factores[f.clave];
    const esNA = val === 'na';
    const nota = (typeof val === 'number') ? val : null;
    const valorTxt = UI.el('span',{class:'zona-nota'}, esNA ? 'No aplica' : (nota != null ? String(nota) : 'sin valorar'));
    // oninput actualiza en vivo SIN repintar (repintar en mitad del arrastre rompe
    // el deslizador y cierra "Más factores"); el repintado va en onchange (al soltar).
    const slider = UI.el('input',{ type:'range', min:'1', max:'10', step:'1', value: nota != null ? nota : 5,
      ...(esNA ? { disabled:'disabled' } : {}),
      oninput:(e)=>{ const n = parseInt(e.target.value, 10); project.zona.factores[f.clave] = n; valorTxt.textContent = String(n); App.guardarDebounced(); },
      onchange:()=>App.refrescarTab()
    });
    const na = UI.el('label',{class:'zona-na'},[
      UI.el('input',{ type:'checkbox', ...(esNA ? { checked:'checked' } : {}), onchange:(e)=>{
        if (e.target.checked) project.zona.factores[f.clave] = 'na';
        else delete project.zona.factores[f.clave];
        App.guardarDebounced(); App.refrescarTab();
      }}),
      UI.el('span',null,'No aplica')
    ]);
    return UI.el('div',{class:'zona-factor'},[
      UI.el('div',{class:'zona-factor__top'},[ UI.el('label',null,f.etiqueta), valorTxt ]),
      UI.el('div',{class:'microayuda'}, f.ayuda),
      slider, na
    ]);
  };

  const card = UI.el('div',{class:'card'},[UI.el('h2',null,'Valora la zona (1-10, opcional)')]);
  catalogo.filter(f => f.destacado).forEach(f => card.appendChild(filaFactor(f)));
  const det = UI.el('details',{class:'mas-detalle', ...(UI.zonaMasAbierto ? {open:''} : {}),
    ontoggle:(e)=>{ if (e.target === e.currentTarget) UI.zonaMasAbierto = e.target.open; }},
    [UI.el('summary',null,'Más factores')]);
  catalogo.filter(f => !f.destacado).forEach(f => det.appendChild(filaFactor(f)));
  card.appendChild(det);
  cont.appendChild(card);
};

UI.renderObservaciones = function (project, cont) {
  cont = cont || document.getElementById('panel-tab'); cont.innerHTML = '';
  if (!Array.isArray(project.observaciones)) project.observaciones = [];
  if (!project.observacionesParams || typeof project.observacionesParams !== 'object') project.observacionesParams = { horasDia: 10, diasMes: 26 };
  const params = project.observacionesParams;
  const obs = project.observaciones;
  const r = Engine.resumenObservaciones(obs, params, project);

  // helper de chips (reutiliza el look segmentado btn--seg)
  const chipGroup = (opciones, actual, onPick) => UI.el('div', { class: 'chips' }, opciones.map(o =>
    UI.el('button', { class: 'btn btn--seg' + (o.clave === actual ? ' activa' : ''),
      onclick: () => { onPick(o.clave); App.guardarDebounced(); App.refrescarTab(); } }, o.etiqueta)));

  // --- Tarjeta de contraste (neutra: informa, no juzga bueno/malo) ---
  const cab = UI.el('div', { class: 'card' });
  const sem = UI.el('div', { class: 'semaforo semaforo--neutro' });
  if (r.fiabilidad === 'sin_datos') {
    sem.appendChild(UI.el('div', null, [
      UI.el('div', { class: 'kpi' }, 'Aún sin visitas'),
      UI.el('div', { class: 'muted' }, 'Añade una visita cuando vayas al local.')
    ]));
  } else {
    const desv = r.desviacionPct == null ? null
      : (r.desviacionPct >= 0 ? '+' : '') + Math.round(r.desviacionPct * 100) + ' %';
    const linea = r.n + ' visita' + (r.n === 1 ? '' : 's') + ' · media ' + Math.round(r.mediaEurHora) + ' €/h'
      + (r.mesMedioDatos ? ' · tu mes medio ' + UI.eur(r.mesMedioDatos) : '')
      + (desv ? ' → ' + desv : '');
    sem.appendChild(UI.el('div', null, [
      UI.el('div', { class: 'kpi' }, '≈ ' + UI.eur(r.cajaMesObs) + '/mes observado'),
      UI.el('div', { class: 'muted' }, linea)
    ]));
  }
  cab.appendChild(sem);
  if (r.fiabilidad === 'baja') {
    cab.appendChild(UI.el('div', { class: 'microayuda' },
      'Pocas visitas o poco variadas: estimación orientativa. Visita en franjas distintas (mañana/tarde, finde/laborable) para afinar.'));
  }
  cab.appendChild(UI.el('div', { class: 'grid-2' }, [
    UI.campo(project, 'Horas de apertura/día', params, 'horasDia', 'number', null, '10', true),
    UI.campo(project, 'Días abiertos/mes', params, 'diasMes', 'number', null, '26', true)
  ]));
  cont.appendChild(cab);

  // --- Lista de fichas ---
  obs.forEach((f) => {
